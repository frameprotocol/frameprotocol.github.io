<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #ffffff; min-height: 100%; }
    body {
      color: #000000;
      -webkit-font-smoothing: antialiased;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: clamp(64px, 12vh, 96px) 0 clamp(48px, 8vh, 72px);
    }
    .home-link { color: inherit; text-decoration: none; }
    .brand {
      position: fixed; top: 8px; left: 8px; margin: 0; z-index: 6;
      font-family: 'Chakra Petch', sans-serif; font-weight: 700; color: #000000;
      font-size: clamp(18px, 5vw, 40px); letter-spacing: 0.08em; line-height: 1;
    }

    .panel { width: min(92vw, 620px); }
    .title {
      font-family: 'Chakra Petch', sans-serif; font-weight: 700;
      letter-spacing: 0.03em; font-size: clamp(1.5rem, 6vw, 2.1rem);
      margin: 0; text-align: center;
    }
    .subtitle {
      color: #666666; font-weight: 500; text-align: center;
      margin: 8px 0 0; font-size: clamp(0.9rem, 3.2vw, 1rem);
    }
    .frameline { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .frame-name { font-family: 'Space Mono', monospace; font-weight: 700; font-size: clamp(0.95rem, 3.6vw, 1.15rem); }
    .name-input {
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: clamp(0.95rem, 3.6vw, 1.15rem);
      border: 1.5px solid #000000; padding: 2px 8px; width: 8em; text-align: center;
      background: #ffffff; color: #000000;
    }
    .edit-btn {
      background: none; border: 0; padding: 2px; cursor: pointer; color: #888888;
      display: inline-flex; align-items: center; transition: color 0.15s ease;
    }
    .edit-btn:hover { color: #000000; }
    .edit-btn svg { width: 15px; height: 15px; }
    .verified {
      display: inline-flex; align-items: center; gap: 5px;
      background: #17a34a; color: #ffffff; border-radius: 999px;
      padding: 3px 10px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .verified.pending { background: #f5c400; color: #4a3b00; }
    .verified svg { width: 13px; height: 13px; }
    .divider { width: 100%; height: 0; border-top: 1.5px solid #000000; margin: clamp(16px, 3vh, 22px) 0; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: clamp(12px, 1.8vw, 18px);
    }
    .feat {
      border: 1px solid #e6e6e6;
      border-radius: 14px;
      padding: clamp(16px, 2.4vw, 22px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #ffffff;
      text-decoration: none;
      color: #000000;
      transition: border-color 0.15s ease, transform 0.15s ease;
    }
    .feat:hover { border-color: #000000; transform: translateY(-2px); }
    .feat .ic {
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 10px; background: #f2f2f2; color: #000000; flex: 0 0 auto;
    }
    .feat .ic svg { width: 20px; height: 20px; display: block; }
    .feat h3 {
      font-family: 'Chakra Petch', sans-serif; font-weight: 700;
      font-size: clamp(1.05rem, 2.4vw, 1.2rem); letter-spacing: 0.01em;
      line-height: 1.2; margin: 0;
    }
    .feat .line {
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: clamp(0.9rem, 3vw, 1.02rem); word-break: break-all;
    }
    .feat .sub { font-size: clamp(0.82rem, 2.2vw, 0.92rem); color: #666666; line-height: 1.45; }
    .feat .filebars {
      display: flex; align-items: flex-end; gap: 2px;
      height: 40px; margin: 2px 0; padding: 4px 0;
      border-bottom: 1px solid #e6e6e6; overflow-x: auto;
    }
    .feat .fbar { width: 5px; flex: 0 0 auto; background: #000000; border-radius: 1px 1px 0 0; min-height: 2px; }
    .feat .fbar.other { background: #b8b8b8; }
    .feat .pctline { font-family: 'Space Mono', monospace; font-weight: 700; font-size: clamp(0.78rem, 2.6vw, 0.95rem); }
    .feat .row-open {
      margin-top: 2px; font-weight: 600; font-size: 0.82rem; color: #000000;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .feat .pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: #17a34a; color: #ffffff; border-radius: 999px;
      padding: 2px 9px; font-size: 0.66rem; font-weight: 700; letter-spacing: 0.04em;
    }
    .feat .pill svg { width: 11px; height: 11px; }

    .corner {
      position: fixed; width: clamp(28px, 6vw, 56px); height: clamp(28px, 6vw, 56px);
      border-color: #000000; border-style: solid; border-width: 0; pointer-events: none;
    }
    .corner.tl { top: 0; left: 0; border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: 0; right: 0; border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: 0; left: 0; border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: 0; right: 0; border-bottom-width: 2.5px; border-right-width: 2.5px; }
  </style>
</head>
<body>
  <script src="/frame.js"></script>
  <script>
    (function () {
      try {
        var idents = FRAME.getIdentities();
        if (idents.length === 0) { window.location.replace("/dashboard.html"); return; }
        var active = FRAME.getActive();
        if (!active) { window.location.replace("/identity.html"); return; }
        if (!FRAME.isUnlocked(active.frameId)) { window.location.replace("/unlock.html"); }
      } catch (e) {}
    })();
  </script>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <h1 class="brand"><a class="home-link" href="/">FRAME</a></h1>

  <main class="panel">
    <h2 class="title">Frame</h2>
    <p class="subtitle">This FRAME at a glance.</p>
    <div class="frameline">
      <span class="frame-name" id="frameName">Frame:1</span>
      <button class="edit-btn" id="editName" type="button" title="Rename this FRAME" aria-label="Rename this FRAME"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
      <span class="verified" id="framePill"><svg id="pillIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span id="pillText">Verified</span></span>
    </div>
    <div class="divider"></div>

    <div class="cards">
      <a class="feat" href="/storage.html">
        <span class="ic" style="color:#1a73e8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v6c0 1.66 3.58 3 8 3s8-1.34 8-3V5"/><path d="M4 11v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6"/></svg></span>
        <h3>Storage</h3>
        <div class="filebars" id="stBars"></div>
        <div class="pctline" id="stPct">— used</div>
        <div class="line" id="stUsed">Used —</div>
        <div class="sub" id="stSub">Loading storage estimate…</div>
        <span class="row-open">Open storage &rarr;</span>
      </a>

      <a class="feat" href="/identity.html">
        <span class="ic" style="color:#17a34a"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg></span>
        <h3>Identity</h3>
        <div class="line" id="idActive">identity:—</div>
        <div class="sub" id="idSub">—</div>
        <span class="pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Verified</span>
        <span class="row-open">Manage identities &rarr;</span>
      </a>
    </div>
  </main>

  <script>
    (function () {
      var active = FRAME.getActive();
      var count = FRAME.getIdentities().length;

      /* ---------- Identity card ---------- */
      if (active) document.getElementById("idActive").textContent = active.frameId;
      document.getElementById("idSub").textContent =
        count + (count === 1 ? " identity" : " identities") + " on this device \u00b7 " + FRAME.browserName();

      /* ---------- Editable frame name + verified pill ---------- */
      var frameName = document.getElementById("frameName");
      var editName = document.getElementById("editName");
      var pill = document.getElementById("framePill");
      var pillIcon = document.getElementById("pillIcon");
      var pillText = document.getElementById("pillText");

      var CHECK = '<polyline points="20 6 9 17 4 12"/>';
      var MINUS = '<line x1="5" y1="12" x2="19" y2="12"/>';

      if (active && active.label) frameName.textContent = active.label;

      var pendingTimer = null;
      function setPending() {
        pill.classList.add("pending");
        pillIcon.innerHTML = MINUS;
        pillText.textContent = "Pending";
        if (pendingTimer) clearTimeout(pendingTimer);
        pendingTimer = setTimeout(function () {
          pill.classList.remove("pending");
          pillIcon.innerHTML = CHECK;
          pillText.textContent = "Verified";
        }, 2000);
      }

      function saveName(newName) {
        newName = (newName || "").trim();
        if (!newName) return;
        frameName.textContent = newName;
        if (active) { active.label = newName; try { FRAME.updateIdentity(active); } catch (e) {} }
        setPending();
      }

      editName.addEventListener("click", function () {
        if (frameName.style.display === "none") return; // already editing
        var input = document.createElement("input");
        input.className = "name-input";
        input.type = "text";
        input.maxLength = 24;
        input.value = frameName.textContent;
        frameName.style.display = "none";
        frameName.parentNode.insertBefore(input, frameName);
        input.focus();
        input.select();

        var done = false;
        function finish(commit) {
          if (done) return; done = true;
          if (commit) saveName(input.value);
          if (input.parentNode) input.parentNode.removeChild(input);
          frameName.style.display = "";
        }
        input.addEventListener("keydown", function (e) {
          if (e.key === "Enter") { e.preventDefault(); finish(true); }
          else if (e.key === "Escape") { finish(false); }
        });
        input.addEventListener("blur", function () { finish(true); });
      });

      /* ---------- Storage card ---------- */
      function exactPct(used, total) {
        if (!total || total <= 0) return "0%";
        var p = used / total * 100;
        if (p <= 0) return "0%";
        var s = p >= 1 ? p.toFixed(2) : p.toPrecision(2);
        return s + "%";
      }

      function renderBars(usage, quota) {
        var container = document.getElementById("stBars");
        container.innerHTML = "";
        var entries = FRAME.localStorageEntries();
        entries.sort(function (a, b) { return b.bytes - a.bytes; });
        // Represent the remaining free allowance as one lighter bar for scale.
        var maxBytes = 1;
        entries.forEach(function (e) { if (e.bytes > maxBytes) maxBytes = e.bytes; });
        var free = quota && quota > 0 ? Math.max(0, quota - usage) : 0;
        var freeScaled = free > 0 ? Math.max(maxBytes, free) : 0;
        if (freeScaled > maxBytes) maxBytes = freeScaled;

        entries.forEach(function (e) {
          var bar = document.createElement("div");
          bar.className = "fbar";
          var h = Math.max(3, Math.round((e.bytes / maxBytes) * 34));
          bar.style.height = h + "px";
          bar.title = e.name + " \u2014 " + FRAME.humanBytesLong(e.bytes);
          container.appendChild(bar);
        });
        if (free > 0) {
          var fb = document.createElement("div");
          fb.className = "fbar other";
          fb.style.height = Math.max(3, Math.round((freeScaled / maxBytes) * 34)) + "px";
          fb.title = "free \u2014 " + FRAME.humanBytesLong(free);
          container.appendChild(fb);
        }
        if (!entries.length && free <= 0) {
          var one = document.createElement("div");
          one.className = "fbar"; one.style.height = "3px";
          container.appendChild(one);
        }
      }

      function fillStorage(usage, quota) {
        renderBars(usage, quota);
        document.getElementById("stPct").textContent = exactPct(usage, quota) + " used";
        document.getElementById("stUsed").textContent = "Used " + FRAME.humanBytesLong(usage);
        if (quota && quota > 0) {
          var free = Math.max(0, quota - usage);
          document.getElementById("stSub").textContent = FRAME.browserName() + " allows: " + FRAME.humanBytesLong(free) + " free";
        } else {
          document.getElementById("stSub").textContent = FRAME.browserName() + " does not report an allowance";
        }
      }

      var localBytes = FRAME.localStorageBytes();
      if (navigator.storage && navigator.storage.estimate) {
        navigator.storage.estimate().then(function (est) {
          fillStorage(Math.max(est.usage || 0, localBytes), est.quota || 0);
        }).catch(function () { fillStorage(localBytes, 0); });
      } else {
        fillStorage(localBytes, 0);
      }
    })();
  </script>
</body>
</html>
