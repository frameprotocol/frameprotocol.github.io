<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: "DSEG7 Classic";
      src: url("/fonts/dseg7-classic-bold.woff2") format("woff2");
      font-weight: 700;
      font-style: normal;
      font-display: block;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      color: #14fd70; -webkit-font-smoothing: antialiased;
      font-family: 'Share Tech Mono', 'Space Grotesk', monospace;
      background: #0b1a0b;
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(20, 253, 112, 0.08), transparent 55%),
        repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 3px);
      display: flex; align-items: center; justify-content: center;
      padding: clamp(64px, 12vh, 96px) 0 clamp(48px, 8vh, 72px);
    }
    .home-link { color: inherit; text-decoration: none; }
    .brand {
      position: fixed; top: 8px; left: 8px; margin: 0; z-index: 6;
      font-family: 'Chakra Petch', sans-serif; font-weight: 700; color: #14fd70;
      font-size: clamp(18px, 5vw, 40px); letter-spacing: 0.08em; line-height: 1;
      text-shadow: 0 0 12px rgba(20, 253, 112, 0.35);
    }
    .calc {
      width: min(92vw, 380px);
      border: 2px solid #14fd70;
      border-radius: 6px;
      padding: 18px 16px 16px;
      background: rgba(6, 18, 6, 0.92);
      box-shadow:
        0 0 0 1px rgba(20, 253, 112, 0.25),
        0 0 28px rgba(20, 253, 112, 0.12),
        inset 0 0 40px rgba(20, 253, 112, 0.04);
      position: relative;
      overflow: hidden;
    }
    .calc::before {
      content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 2;
      background: repeating-linear-gradient(
        180deg,
        rgba(20, 253, 112, 0.03) 0 1px,
        transparent 1px 4px
      );
    }
    .title {
      font-family: 'Share Tech Mono', monospace; font-weight: 700;
      letter-spacing: 0.18em; font-size: clamp(0.95rem, 3.6vw, 1.15rem);
      margin: 0 0 4px; text-align: center; color: #14fd70;
      text-transform: uppercase;
    }
    .saved-note {
      text-align: center; color: #3d9a55; font-size: 0.72rem;
      letter-spacing: 0.06em; margin-bottom: 14px; text-transform: uppercase;
    }

    .display {
      border: 1.5px solid #14fd70; border-radius: 4px;
      padding: 14px 14px 10px; text-align: right; margin-bottom: 14px;
      background: #031406;
      box-shadow: inset 0 0 18px rgba(20, 253, 112, 0.12);
      position: relative; z-index: 1;
    }
    .expr {
      font-family: 'Share Tech Mono', monospace; color: #2f8f48;
      font-size: 0.85rem; min-height: 1.1em; word-break: break-all;
      letter-spacing: 0.04em;
    }
    .result {
      font-family: "DSEG7 Classic", monospace !important;
      font-weight: 700;
      font-style: normal;
      font-size: clamp(1.85rem, 8.5vw, 2.6rem);
      word-break: break-all;
      color: #14fd70;
      text-shadow: 0 0 10px rgba(20, 253, 112, 0.45);
      letter-spacing: 0.08em;
      line-height: 1.35;
      margin-top: 6px;
      -webkit-font-smoothing: antialiased;
    }

    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; position: relative; z-index: 1; }
    .key {
      border: 1.5px solid #14fd70; border-radius: 4px;
      background: #0a1f0a; color: #14fd70;
      font-family: 'Share Tech Mono', monospace; font-weight: 700;
      font-size: clamp(1.05rem, 4.2vw, 1.25rem); padding: clamp(12px, 3.2vw, 16px) 0;
      cursor: pointer; transition: background 0.12s ease, color 0.12s ease, box-shadow 0.12s ease;
      -webkit-user-select: none; user-select: none;
      box-shadow: inset 0 0 8px rgba(20, 253, 112, 0.08);
    }
    .key:hover {
      background: #14fd70; color: #031406;
      box-shadow: 0 0 14px rgba(20, 253, 112, 0.35);
    }
    .key:active { transform: translateY(1px); }
    .key.op { background: #0e2a10; }
    .key.op.active { background: #14fd70; color: #031406; }
    .key.eq { background: #146b2e; color: #b8ffc8; }
    .key.eq:hover { background: #14fd70; color: #031406; }
    .key.fn { color: #3d9a55; }
    .key.wide { grid-column: span 2; text-align: left; padding-left: 22px; }

    .back {
      display: block; text-align: center; margin-top: 16px;
      color: #14fd70; font-weight: 600; font-size: 0.82rem;
      text-decoration: none; letter-spacing: 0.08em; text-transform: uppercase;
      position: relative; z-index: 1;
    }
    .back:hover { text-shadow: 0 0 10px rgba(20, 253, 112, 0.5); }

    .corner { position: fixed; width: clamp(28px, 6vw, 56px); height: clamp(28px, 6vw, 56px); border-color: #14fd70; border-style: solid; border-width: 0; pointer-events: none; }
    .corner.tl { top: 0; left: 0; border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: 0; right: 0; border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: 0; left: 0; border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: 0; right: 0; border-bottom-width: 2.5px; border-right-width: 2.5px; }
  </style>
</head>
<body>
  <script src="/frame.js"></script>
  <script>
    (function () {
      FRAME.gate().then(function (active) { if (!active) return; });
    })();
  </script>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <h1 class="brand"><a class="home-link" href="/">FRAME</a></h1>

  <main class="calc">
    <h2 class="title">RobCo Calc</h2>
    <div class="saved-note">Saved in your FRAME storage</div>
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="grid">
      <button class="key fn" data-act="clear">AC</button>
      <button class="key fn" data-act="sign">+/-</button>
      <button class="key fn" data-act="percent">%</button>
      <button class="key op" data-op="/">&divide;</button>

      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key op" data-op="*">&times;</button>

      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key op" data-op="-">&minus;</button>

      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key op" data-op="+">+</button>

      <button class="key wide" data-num="0">0</button>
      <button class="key" data-dot>.</button>
      <button class="key eq" data-act="equals">=</button>
    </div>
    <a class="back" href="/dapps.html">Back to dApps</a>
  </main>

  <script>
    (function () {
      var KEY = "frame.dapp.calculator";
      var exprEl = document.getElementById("expr");
      var resultEl = document.getElementById("result");

      var ident = null;
      try { ident = FRAME.getActive(); } catch (e) {}
      var sigSeq = 0;

      function refreshSig(payload) {
        if (!ident || !ident.privateKey || !ident.publicKey) return;
        var mySeq = ++sigSeq;
        var alg = FRAME.keyAlgLabel(ident.publicKey);
        FRAME.signData(ident.privateKey, payload).then(function (sig) {
          return FRAME.verifyData(ident.publicKey, payload, sig).then(function (ok) {
            if (mySeq !== sigSeq || !ok) return;
            try {
              var d = JSON.parse(localStorage.getItem(KEY) || "null") || {};
              d.signature = sig; d.signedBy = ident.frameId; d.sigAlg = alg; d.sigScheme = "FRAME_SIGNATURE_V1";
              d.digest = "SHA-256"; d.encoding = "base64"; d.signedOver = "raw digest bytes";
              localStorage.setItem(KEY, JSON.stringify(d));
            } catch (e) {}
          });
        }).catch(function () {});
      }

      var current = "0";
      var stored = null;
      var op = null;
      var replace = true;

      function load() {
        var projected = FRAME.projectCalculatorState ? FRAME.projectCalculatorState() : null;
        if (projected && projected.display != null) {
          current = projected.display;
          return;
        }
        try {
          var d = JSON.parse(localStorage.getItem(KEY) || "null");
          if (d && d.state && typeof d.state.display === "string") current = d.state.display;
        } catch (e) {}
      }
      function persist() {
        var payload;
        try {
          var d = JSON.parse(localStorage.getItem(KEY) || "null") || { name: "Calculator", version: "1.0.0", installedAt: new Date().toISOString() };
          d.state = { display: current, expr: exprEl.textContent };
          d.updatedAt = new Date().toISOString();
          payload = JSON.stringify(d.state);
          localStorage.setItem(KEY, JSON.stringify(d));
        } catch (e) {}
        if (payload !== undefined) refreshSig(payload);
      }

      function opLabel(o) {
        return ({ "+": "+", "-": "\u2212", "*": "\u00d7", "/": "\u00f7" })[o] || o;
      }

      /** Log every input / equation onto the hash-linked receipt chain (capability-gated). */
      function logChain(action, payload, result, title) {
        if (!FRAME.mutate) return;
        FRAME.mutate({
          capability: "calc.write",
          action: "calc." + action,
          dapp: KEY,
          title: title || ("calc." + action),
          payload: payload,
          result: result
        }).catch(function () {});
      }

      function calcJobTitle() {
        if (op !== null && stored !== null) {
          return "Calculator · " + fmt(stored) + " " + opLabel(op) + (replace ? "" : " " + current);
        }
        return "Calculator · " + current;
      }

      function syncCalcJob(status, title) {
        if (!FRAME.syncDappJob) return;
        FRAME.syncDappJob({
          id: "job_calc",
          title: title || calcJobTitle(),
          status: status,
          source: KEY
        });
      }

      function fmt(n) {
        if (!isFinite(n)) return "Error";
        var r = Math.round((n + Number.EPSILON) * 1e10) / 1e10;
        return String(r);
      }
      function render() {
        resultEl.textContent = current;
        exprEl.textContent = (op !== null && stored !== null) ? (fmt(stored) + " " + opLabel(op)) : "";
      }

      function inputDigit(d) {
        var before = current;
        if (replace) { current = (d === "0") ? "0" : d; replace = false; }
        else { if (current === "0") current = d; else current += d; }
        render(); persist();
        logChain("input", { kind: "digit", digit: d, before: before }, { display: current }, "input " + d + " → " + current);
        if (op !== null) syncCalcJob("running");
      }
      function inputDot() {
        var before = current;
        if (replace) { current = "0."; replace = false; }
        else if (current.indexOf(".") < 0) current += ".";
        else return;
        render(); persist();
        logChain("input", { kind: "dot", before: before }, { display: current }, "input . → " + current);
        if (op !== null) syncCalcJob("running");
      }
      function clearAll() {
        var before = { display: current, stored: stored, op: op };
        current = "0"; stored = null; op = null; replace = true; render(); persist();
        logChain("clear", before, { display: current }, "clear");
        syncCalcJob("remove");
      }
      function sign() {
        var before = current;
        if (current !== "0") current = current.charAt(0) === "-" ? current.slice(1) : "-" + current;
        render(); persist();
        logChain("sign", { before: before }, { display: current }, "+/− → " + current);
        if (op !== null) syncCalcJob("running");
      }
      function percent() {
        var before = current;
        current = fmt(parseFloat(current) / 100); replace = true; render(); persist();
        logChain("percent", { before: before }, { display: current }, "% → " + current);
        if (op !== null) syncCalcJob("running");
      }

      function compute(a, b, o) {
        switch (o) { case "+": return a + b; case "-": return a - b; case "*": return a * b; case "/": return b === 0 ? NaN : a / b; }
        return b;
      }
      function setOp(o) {
        var val = parseFloat(current);
        var before = { display: current, stored: stored, op: op };
        var partial = null;
        if (op !== null && !replace) {
          var r = compute(stored, val, op);
          partial = { left: stored, op: op, right: val, value: r };
          current = fmt(r); stored = parseFloat(current);
        } else {
          stored = val;
        }
        op = o; replace = true; render(); persist();
        highlight(o);
        var title = partial
          ? (fmt(partial.left) + " " + opLabel(partial.op) + " " + fmt(partial.right) + " = " + current + " · then " + opLabel(o))
          : (current + " " + opLabel(o));
        logChain("op", before, { display: current, stored: stored, op: op, partial: partial }, title);
        syncCalcJob("running", "Calculator · " + fmt(stored) + " " + opLabel(op));
      }
      function equals() {
        if (op === null || stored === null) return;
        var val = parseFloat(current);
        var left = stored, o = op, right = val;
        var r = compute(stored, val, op);
        current = fmt(r); stored = null; op = null; replace = true; render(); persist();
        highlight(null);
        var eq = fmt(left) + " " + opLabel(o) + " " + fmt(right) + " = " + current;
        logChain("equals", { left: left, op: o, right: right }, { value: current, equation: eq }, eq);
        syncCalcJob("done", "Calculator · " + eq);
      }

      function highlight(o) {
        document.querySelectorAll(".key.op").forEach(function (b) {
          b.classList.toggle("active", !!o && b.getAttribute("data-op") === o);
        });
      }

      document.querySelector(".grid").addEventListener("click", function (e) {
        var b = e.target.closest("button");
        if (!b) return;
        if (b.hasAttribute("data-num")) inputDigit(b.getAttribute("data-num"));
        else if (b.hasAttribute("data-dot")) inputDot();
        else if (b.hasAttribute("data-op")) setOp(b.getAttribute("data-op"));
        else {
          var act = b.getAttribute("data-act");
          if (act === "clear") clearAll();
          else if (act === "sign") sign();
          else if (act === "percent") percent();
          else if (act === "equals") equals();
        }
      });

      document.addEventListener("keydown", function (e) {
        if (e.key >= "0" && e.key <= "9") inputDigit(e.key);
        else if (e.key === ".") inputDot();
        else if (e.key === "+" || e.key === "-" || e.key === "*" || e.key === "/") setOp(e.key);
        else if (e.key === "Enter" || e.key === "=") { e.preventDefault(); equals(); }
        else if (e.key === "Escape") clearAll();
        else if (e.key === "%") percent();
      });

      load();
      render();
      persist();
    })();
  </script>
</body>
</html>
