<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #ffffff; min-height: 100%; }
    body {
      color: #000000; -webkit-font-smoothing: antialiased;
      font-family: 'Space Grotesk', sans-serif;
      display: flex; align-items: flex-start; justify-content: center;
      padding: clamp(64px, 12vh, 96px) 0 clamp(48px, 8vh, 72px);
    }
    .home-link { color: inherit; text-decoration: none; }
    .brand {
      position: fixed; top: 8px; left: 8px; margin: 0; z-index: 6;
      font-family: 'Chakra Petch', sans-serif; font-weight: 700; color: #000000;
      font-size: clamp(18px, 5vw, 40px); letter-spacing: 0.08em; line-height: 1;
    }
    .panel { width: min(92vw, 560px); }
    .title { font-family: 'Chakra Petch', sans-serif; font-weight: 700; letter-spacing: 0.03em; font-size: clamp(1.5rem, 6vw, 2.1rem); margin: 0; text-align: center; }
    .subtitle { color: #666666; font-weight: 500; text-align: center; margin: 8px 0 0; font-size: clamp(0.9rem, 3.2vw, 1rem); }
    .divider { width: 100%; height: 0; border-top: 1.5px solid #000000; margin: clamp(16px, 3vh, 22px) 0; }

    .search {
      width: 100%; border: 1.5px solid #000000; border-radius: 12px;
      padding: 12px 14px; font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem;
      margin-bottom: 8px; background: #ffffff;
    }
    .search::placeholder { color: #999999; }
    .search-empty { text-align: center; color: #888888; font-size: 0.9rem; padding: 18px 0; display: none; }
    .app.hidden { display: none; }

    .sec-label { font-family: 'Space Mono', monospace; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: #999999; margin: clamp(18px, 3vh, 26px) 0 12px; }
    .cards {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: clamp(16px, 3.2vw, 28px); justify-items: center;
      padding-bottom: 48px;
    }
    .app {
      position: relative; display: block; text-decoration: none; color: #000000;
      width: 96px; height: 96px; background: none; border: 0; padding: 0; cursor: pointer;
      font-family: inherit; z-index: 1;
      -webkit-touch-callout: none; user-select: none;
    }
    .app .shell {
      position: absolute; left: 50%; top: 0; transform: translateX(-50%);
      width: 96px; min-height: 96px;
      display: flex; flex-direction: column; align-items: center; gap: 9px;
      padding: 8px 10px 12px; border-radius: 18px;
      background: transparent; border: 1.5px solid transparent;
      transition:
        width 0.22s cubic-bezier(0.2, 0.8, 0.2, 1),
        min-height 0.22s cubic-bezier(0.2, 0.8, 0.2, 1),
        padding 0.22s ease,
        background 0.18s ease,
        border-color 0.18s ease,
        box-shadow 0.22s ease,
        transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1);
      transform-origin: top center;
    }
    .app .ic {
      width: 58px; height: 58px; display: flex; align-items: center; justify-content: center;
      border-radius: 15px; background: #f4f4f5; color: #000000; flex: 0 0 auto;
      transition: transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1), width 0.22s ease, height 0.22s ease;
    }
    .app .ic svg { width: 30px; height: 30px; display: block; transition: width 0.22s ease, height 0.22s ease; }
    .app .ic.term-ic { background: #0a0a0a; color: #3ddc84; }
    .app .name {
      font-weight: 600; font-size: clamp(0.78rem, 2.4vw, 0.9rem);
      text-align: center; line-height: 1.15;
      transition: font-size 0.18s ease;
    }
    .app .info {
      display: none; width: 100%; margin-top: 2px;
      font-family: 'Space Mono', monospace; font-size: 0.68rem; line-height: 1.35;
      color: #555555; text-align: left;
      opacity: 0; max-height: 0; overflow: hidden;
      transition: opacity 0.18s ease 0.04s, max-height 0.22s ease;
    }
    .app .info .k { color: #999999; }
    .app:hover, .app:focus-within { z-index: 8; }
    .app:hover .shell, .app:focus-within .shell {
      width: 210px; min-height: 150px;
      background: #ffffff; border-color: #000000;
      box-shadow: 0 14px 34px rgba(0,0,0,0.14);
      transform: translateX(-50%) translateY(-6px) scale(1.04);
      padding: 12px 14px 14px;
    }
    .app:hover .ic, .app:focus-within .ic {
      width: 64px; height: 64px; transform: scale(1.06);
    }
    .app:hover .ic svg, .app:focus-within .ic svg { width: 34px; height: 34px; }
    .app:hover .name, .app:focus-within .name { font-size: 0.95rem; }
    .app:hover .info, .app:focus-within .info {
      display: block; opacity: 1; max-height: 120px;
    }
    .app.holding .shell {
      transform: translateX(-50%) scale(0.94);
      opacity: 0.85;
    }

    /* Long-press glass sheet */
    .sheet {
      position: fixed; inset: 0; z-index: 50;
      display: none; align-items: center; justify-content: center;
      padding: 24px;
      background: rgba(240, 242, 245, 0.35);
      -webkit-backdrop-filter: blur(22px) saturate(1.35);
      backdrop-filter: blur(22px) saturate(1.35);
    }
    .sheet.on { display: flex; animation: sheet-in 0.22s ease; }
    @keyframes sheet-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .sheet-card {
      width: min(92vw, 380px);
      border-radius: 24px;
      padding: 18px 18px 16px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.14),
        inset 0 1px 0 rgba(255, 255, 255, 0.65);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      backdrop-filter: blur(28px) saturate(1.4);
      animation: card-in 0.24s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @keyframes card-in {
      from { opacity: 0; transform: scale(0.94) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .sheet-head {
      display: flex; align-items: flex-start; gap: 14px;
      margin-bottom: 16px;
    }
    .sheet-ic {
      width: 56px; height: 56px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.75); flex: 0 0 auto;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    .sheet-ic.term { background: #0a0a0a; }
    .sheet-ic svg { width: 28px; height: 28px; display: block; }
    .sheet-meta { min-width: 0; flex: 1 1 auto; padding-top: 2px; }
    .sheet-name {
      font-family: 'Chakra Petch', sans-serif; font-weight: 700;
      font-size: 1.2rem; letter-spacing: 0.02em; margin: 0;
    }
    .sheet-id {
      font-family: 'Space Mono', monospace; font-size: 0.68rem;
      color: #666666; margin-top: 4px; word-break: break-all;
    }
    .sheet-close {
      border: 0; background: rgba(0,0,0,0.06); color: #333;
      width: 32px; height: 32px; border-radius: 10px; cursor: pointer;
      font-size: 1.1rem; line-height: 1; flex: 0 0 auto;
    }
    .sheet-close:hover { background: rgba(0,0,0,0.12); }
    .sheet-label {
      font-family: 'Space Mono', monospace; font-size: 0.68rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: #777;
      margin: 0 0 8px;
    }
    .cap-list { display: flex; flex-direction: column; gap: 6px; margin: 0 0 14px; }
    .cap {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 8px 10px; border-radius: 12px;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(0,0,0,0.06);
      font-family: 'Space Mono', monospace; font-size: 0.78rem;
    }
    .cap .tag {
      font-size: 0.64rem; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; padding: 2px 7px; border-radius: 999px;
    }
    .cap .tag.on { background: #e9f7ef; color: #0f7a3d; }
    .cap .tag.off { background: #f4f4f5; color: #888; }
    .cap-empty { color: #888; font-size: 0.85rem; margin-bottom: 14px; }
    .sheet-blurb {
      font-size: 0.82rem; color: #444; line-height: 1.4; margin: 0 0 14px;
    }
    .sheet-open {
      display: block; width: 100%; text-align: center; text-decoration: none;
      border: 1.5px solid #000; border-radius: 12px; padding: 11px 14px;
      color: #000; font-weight: 600; background: rgba(255,255,255,0.7);
    }
    .sheet-open:hover { background: #000; color: #fff; }
    .sheet-hint {
      text-align: center; font-size: 0.72rem; color: #999; margin-top: 10px;
    }

    .corner { position: fixed; width: clamp(28px, 6vw, 56px); height: clamp(28px, 6vw, 56px); border-color: #000000; border-style: solid; border-width: 0; pointer-events: none; }
    .corner.tl { top: 0; left: 0; border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: 0; right: 0; border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: 0; left: 0; border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: 0; right: 0; border-bottom-width: 2.5px; border-right-width: 2.5px; }
  </style>
</head>
<body>
  <script src="/frame.js"></script>
  <script>
    (function () {
      FRAME.gate().then(function (active) {
        if (!active) return;
        function ensureDapp(key, name, state) {
          if (!localStorage.getItem(key)) {
            localStorage.setItem(key, JSON.stringify({
              name: name, version: "1.0.0", installedAt: new Date().toISOString(), state: state
            }));
          }
          var d = null; try { d = JSON.parse(localStorage.getItem(key)); } catch (x) {}
          if (!d || !d.state) return;
          if (d.signature && d.signedBy) return;
          if (!active.privateKey || !active.publicKey) return;
          var payload = JSON.stringify(d.state);
          FRAME.signData(active.privateKey, payload).then(function (sig) {
            return FRAME.verifyData(active.publicKey, payload, sig).then(function (ok) {
              if (!ok) return;
              d.signature = sig;
              d.signedBy = active.frameId;
              d.sigAlg = FRAME.keyAlgLabel(active.publicKey);
              d.sigScheme = "FRAME_SIGNATURE_V1";
              d.digest = "SHA-256";
              d.encoding = "base64";
              d.signedOver = "raw digest bytes";
              d.updatedAt = new Date().toISOString();
              localStorage.setItem(key, JSON.stringify(d));
            });
          }).catch(function () {});
        }
        ensureDapp("frame.dapp.calculator", "Calculator", { display: "0" });
        ensureDapp("frame.dapp.timer", "Timer", { totalMs: 300000, remainingMs: 300000, running: false, done: false });
        ensureDapp("frame.dapp.wallet", "Wallet", { jobs: [], tasks: [] });
      });
    })();
  </script>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <h1 class="brand"><a class="home-link" href="/">FRAME</a></h1>

  <main class="panel">
    <h2 class="title">dApps</h2>
    <p class="subtitle">Apps that run on your FRAME and store data in it. Press and hold for capabilities.</p>
    <div class="divider"></div>

    <input class="search" id="search" type="search" placeholder="Search identities, wallets, tasks, jobs, dApps…" autocomplete="off" />
    <div class="search-empty" id="searchEmpty">No matches.</div>

    <div class="sec-label">Installed</div>
    <div class="cards" id="installed"></div>

    <div class="sec-label">System</div>
    <div class="cards" id="system"></div>
  </main>

  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetName" hidden>
    <div class="sheet-card" id="sheetCard">
      <div class="sheet-head">
        <div class="sheet-ic" id="sheetIc"></div>
        <div class="sheet-meta">
          <h3 class="sheet-name" id="sheetName"></h3>
          <div class="sheet-id" id="sheetId"></div>
        </div>
        <button class="sheet-close" id="sheetClose" type="button" aria-label="Close">&times;</button>
      </div>
      <p class="sheet-blurb" id="sheetBlurb"></p>
      <div class="sheet-label">Capabilities</div>
      <div class="cap-list" id="sheetCaps"></div>
      <a class="sheet-open" id="sheetOpen" href="#">Open</a>
      <div class="sheet-hint">Tap outside to dismiss</div>
    </div>
  </div>

  <script>
    (function () {
      var HOLD_MS = 480;
      var IC = {
        calc: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="15" x2="16" y2="18"/><line x1="8" y1="18" x2="12" y2="18"/></svg>',
        home: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>',
        term: '<svg viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="2.5" fill="#0a0a0a"/><path d="M7.2 8.2 L11 12 L7.2 15.8" stroke="#3ddc84" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M12.5 15.5 H17" stroke="#3ddc84" stroke-width="2.2" stroke-linecap="round"/></svg>',
        storage: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/></svg>',
        wallet: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/><circle cx="17" cy="14" r="1.3"/></svg>',
        timer: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 1.5"/><path d="M9 2h6"/><path d="M12 2v2"/></svg>',
        cloud: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4 4 0 010-8 5 5 0 019.6-1.5A3.5 3.5 0 0117 18H7z"/></svg>'
      };

      var CAPS = {
        "frame.dapp.calculator": {
          blurb: "Signed calculator state and equation receipts on the chain.",
          caps: ["calc.read", "calc.write"]
        },
        "frame.dapp.timer": {
          blurb: "Countdown timer with start, pause, and reset — logged to the chain.",
          caps: ["timer.read", "timer.write"]
        },
        "frame.system.welcome": {
          blurb: "Landing surface for this FRAME instance.",
          caps: []
        },
        "frame.system.command": {
          blurb: "Shell for intents, grants, and receipt-chain audit.",
          caps: ["command.exec", "chain.verify", "grant.manage", "storage.read"]
        },
        "frame.dapp.wallet": {
          blurb: "Identities, crypto wallets, jobs, tasks, and receipts.",
          caps: ["wallet.write", "wallet.export", "wallet.import", "identity.switch", "identity.create", "identity.export", "identity.import", "frame.rename", "frame.clone", "frame.export", "chain.verify"]
        },
        "frame.system.storage_explorer": {
          blurb: "Inspect browser storage usage for this FRAME.",
          caps: ["storage.read"]
        },
        "frame.system.personal_cloud": {
          blurb: "Personal cloud sync surface.",
          caps: ["storage.read"]
        }
      };

      var installed = [
        { id: "frame.dapp.calculator", name: "Calculator", href: "/calculator.html", color: "#ff8a00", icon: IC.calc },
        { id: "frame.dapp.timer", name: "Timer", href: "/timer.html", color: "#e11d48", icon: IC.timer },
        { id: "frame.system.welcome", name: "Welcome", href: "/", color: "#1a73e8", icon: IC.home }
      ];

      var system = [
        { id: "frame.system.command", name: "Command", href: "/command.html", color: "#3ddc84", icon: IC.term, term: true },
        { id: "frame.dapp.wallet", name: "Wallet", href: "/wallet.html", color: "#b45309", icon: IC.wallet },
        { id: "frame.system.storage_explorer", name: "Storage", href: "/storage.html", color: "#0891b2", icon: IC.storage },
        { id: "frame.system.personal_cloud", name: "Personal Cloud", href: "/cloud.html", color: "#0ea5e9", icon: IC.cloud }
      ];

      function readJson(key) {
        try { return JSON.parse(localStorage.getItem(key) || "null"); } catch (e) { return null; }
      }

      function infoFor(d) {
        var lines = [];
        if (d.id === "frame.dapp.calculator") {
          var c = readJson("frame.dapp.calculator");
          var display = (c && c.state && c.state.display != null) ? c.state.display : "0";
          lines.push('<span class="k">display</span> ' + escapeHtml(String(display)));
          if (c && c.updatedAt && FRAME.formatLocalDateTime) {
            lines.push('<span class="k">updated</span> ' + escapeHtml(FRAME.formatLocalDateTime(c.updatedAt)));
          }
        } else if (d.id === "frame.dapp.timer") {
          var t = readJson("frame.dapp.timer");
          var st = (t && t.state) || {};
          var ms = st.remainingMs != null ? st.remainingMs : (st.totalMs || 0);
          var sec = Math.max(0, Math.ceil(ms / 1000));
          var mm = Math.floor(sec / 60);
          var ss = sec % 60;
          var clock = (mm < 10 ? "0" : "") + mm + ":" + (ss < 10 ? "0" : "") + ss;
          lines.push('<span class="k">time</span> ' + clock);
          lines.push('<span class="k">status</span> ' + (st.done ? "done" : st.running ? "running" : "ready"));
        } else if (d.id === "frame.dapp.wallet") {
          var w = readJson("frame.dapp.wallet");
          var st = (w && w.state) || {};
          var ids = [];
          try { ids = FRAME.getIdentities(); } catch (e) {}
          lines.push('<span class="k">identities</span> ' + ids.length);
          lines.push('<span class="k">tasks</span> ' + ((st.tasks || []).length) + ' · <span class="k">jobs</span> ' + ((st.jobs || []).length));
        } else if (d.id === "frame.system.command") {
          try {
            var shell = FRAME.getFrame();
            var chain = FRAME.getReceiptChain ? FRAME.getReceiptChain() : { entries: [] };
            lines.push('<span class="k">id</span> ' + escapeHtml(shell.id));
            lines.push('<span class="k">chain</span> ' + (chain.entries || []).length + " receipts");
          } catch (e) {
            lines.push("FRAME shell");
          }
        } else if (d.id === "frame.system.welcome") {
          lines.push("Start here · FRAME home");
        } else if (d.id === "frame.system.storage_explorer") {
          var bytes = FRAME.localStorageBytes();
          lines.push('<span class="k">local</span> ' + escapeHtml(FRAME.humanBytesLong(bytes)));
          lines.push(FRAME.localStorageEntries().length + " keys");
        } else if (d.id === "frame.system.personal_cloud") {
          lines.push("Sync & cloud storage");
        } else {
          lines.push(escapeHtml(d.id));
        }
        return lines.join("<br>");
      }

      function escapeHtml(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      var sheet = document.getElementById("sheet");
      var sheetIc = document.getElementById("sheetIc");
      var sheetName = document.getElementById("sheetName");
      var sheetId = document.getElementById("sheetId");
      var sheetBlurb = document.getElementById("sheetBlurb");
      var sheetCaps = document.getElementById("sheetCaps");
      var sheetOpen = document.getElementById("sheetOpen");
      var sheetClose = document.getElementById("sheetClose");
      var sheetCard = document.getElementById("sheetCard");

      function closeSheet() {
        sheet.classList.remove("on");
        sheet.hidden = true;
      }

      function openSheet(d) {
        var meta = CAPS[d.id] || { blurb: d.id, caps: [] };
        sheetIc.className = "sheet-ic" + (d.term ? " term" : "");
        sheetIc.style.color = d.color;
        sheetIc.innerHTML = d.icon;
        sheetName.textContent = d.name;
        sheetId.textContent = d.id;
        sheetBlurb.textContent = meta.blurb || "";
        sheetOpen.href = d.href;
        sheetCaps.innerHTML = "";
        var caps = meta.caps || [];
        if (!caps.length) {
          sheetCaps.innerHTML = '<div class="cap-empty">No special capabilities declared.</div>';
        } else {
          caps.forEach(function (cap) {
            var granted = false;
            try { granted = FRAME.hasCapability(FRAME.getActiveId(), cap); } catch (e) {}
            var row = document.createElement("div");
            row.className = "cap";
            row.innerHTML =
              "<span>" + escapeHtml(cap) + "</span>" +
              '<span class="tag ' + (granted ? "on" : "off") + '">' + (granted ? "granted" : "missing") + "</span>";
            sheetCaps.appendChild(row);
          });
        }
        sheet.hidden = false;
        sheet.classList.add("on");
      }

      sheetClose.addEventListener("click", closeSheet);
      sheet.addEventListener("click", function (e) {
        if (e.target === sheet) closeSheet();
      });
      sheetCard.addEventListener("click", function (e) { e.stopPropagation(); });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && sheet.classList.contains("on")) closeSheet();
      });

      function bindHold(el, d) {
        var timer = null;
        var armed = false;
        var startX = 0, startY = 0;

        function clear() {
          if (timer) { clearTimeout(timer); timer = null; }
          el.classList.remove("holding");
        }

        function onDown(e) {
          if (e.button != null && e.button !== 0) return;
          armed = false;
          startX = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
          startY = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
          el.classList.add("holding");
          timer = setTimeout(function () {
            timer = null;
            armed = true;
            el.classList.remove("holding");
            openSheet(d);
            try { if (navigator.vibrate) navigator.vibrate(12); } catch (err) {}
          }, HOLD_MS);
        }

        function onMove(e) {
          if (!timer) return;
          var x = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
          var y = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
          if (Math.abs(x - startX) > 10 || Math.abs(y - startY) > 10) clear();
        }

        function onUp() { clear(); }

        el.addEventListener("pointerdown", onDown);
        el.addEventListener("pointermove", onMove);
        el.addEventListener("pointerup", onUp);
        el.addEventListener("pointercancel", onUp);
        el.addEventListener("pointerleave", onUp);
        el.addEventListener("click", function (e) {
          if (armed) {
            e.preventDefault();
            e.stopPropagation();
            armed = false;
          }
        });
        el.addEventListener("contextmenu", function (e) {
          // Long-press replaces context menu for capability sheet
          e.preventDefault();
        });
      }

      function tile(d) {
        var el = document.createElement("a");
        el.className = "app";
        el.href = d.href;
        el.title = d.name + " — press & hold for capabilities";
        el.setAttribute("data-search", (d.name + " " + d.id).toLowerCase());
        var icClass = d.term ? "ic term-ic" : "ic";
        el.innerHTML =
          '<span class="shell">' +
            '<span class="' + icClass + '" style="color:' + d.color + '">' + d.icon + "</span>" +
            '<span class="name">' + d.name + "</span>" +
            '<span class="info">' + infoFor(d) + "</span>" +
          "</span>";
        bindHold(el, d);
        return el;
      }

      var insEl = document.getElementById("installed");
      installed.forEach(function (d) { insEl.appendChild(tile(d)); });
      var sysEl = document.getElementById("system");
      system.forEach(function (d) { sysEl.appendChild(tile(d)); });

      function collectHits(q) {
        q = (q || "").trim().toLowerCase();
        var hits = [];
        if (!q) return hits;
        FRAME.getIdentities().forEach(function (id) {
          var blob = [id.frameId, id.publicKey].join(" ").toLowerCase();
          if (blob.indexOf(q) >= 0) hits.push({ kind: "identity", label: id.frameId, href: "/wallet.html" });
        });
        try {
          var w = JSON.parse(localStorage.getItem("frame.dapp.wallet") || "null");
          var st = w && w.state ? w.state : {};
          (st.wallets || []).forEach(function (x) {
            var blob = [x.name, x.chain, x.address, x.note].join(" ").toLowerCase();
            if (blob.indexOf(q) >= 0) hits.push({ kind: "wallet", label: x.name, href: "/wallet.html#wallets" });
          });
          (st.tasks || []).forEach(function (t) {
            if (String(t.text || "").toLowerCase().indexOf(q) >= 0)
              hits.push({ kind: "task", label: t.text, href: "/wallet.html#tasks" });
          });
          (st.jobs || []).forEach(function (j) {
            if (String(j.title || "").toLowerCase().indexOf(q) >= 0)
              hits.push({ kind: "job", label: j.title, href: "/wallet.html#jobs" });
          });
        } catch (e) {}
        FRAME.localStorageEntries().forEach(function (e) {
          if (e.name.indexOf("frame.dapp.") !== 0) return;
          if (e.name.toLowerCase().indexOf(q) >= 0)
            hits.push({ kind: "dapp-data", label: e.name, href: "/storage.html" });
        });
        return hits;
      }

      var search = document.getElementById("search");
      var searchEmpty = document.getElementById("searchEmpty");
      search.addEventListener("input", function () {
        var q = search.value.trim().toLowerCase();
        var apps = document.querySelectorAll(".app");
        var shown = 0;
        apps.forEach(function (a) {
          var ok = !q || (a.getAttribute("data-search") || "").indexOf(q) >= 0;
          a.classList.toggle("hidden", !ok);
          if (ok) shown++;
        });
        var extra = q ? collectHits(q) : [];
        if (q && shown === 0 && extra.length === 0) {
          searchEmpty.style.display = "block";
          searchEmpty.textContent = "No matches.";
        } else if (q && shown === 0 && extra.length) {
          searchEmpty.style.display = "block";
          searchEmpty.innerHTML = extra.slice(0, 6).map(function (h) {
            return '<a href="' + h.href + '" style="color:#000;display:block;margin:6px 0">' + h.kind + ": " + h.label + "</a>";
          }).join("");
        } else {
          searchEmpty.style.display = "none";
          searchEmpty.textContent = "";
        }
      });
    })();
  </script>
</body>
</html>
