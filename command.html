<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #ffffff; min-height: 100%; }
    body {
      color: #000000; -webkit-font-smoothing: antialiased;
      font-family: 'Space Grotesk', sans-serif;
      display: flex; align-items: flex-start; justify-content: center;
      padding: clamp(64px, 12vh, 96px) 0 clamp(48px, 8vh, 72px);
    }
    .home-link { color: inherit; text-decoration: none; }
    .brand {
      position: fixed; top: 8px; left: 8px; margin: 0; z-index: 6;
      font-family: 'Chakra Petch', sans-serif; font-weight: 700; color: #000000;
      font-size: clamp(18px, 5vw, 40px); letter-spacing: 0.08em; line-height: 1;
    }
    .panel { width: min(92vw, 640px); }
    .title { font-family: 'Chakra Petch', sans-serif; font-weight: 700; letter-spacing: 0.03em; font-size: clamp(1.5rem, 6vw, 2.1rem); margin: 0; text-align: center; }
    .subtitle { color: #666666; font-weight: 500; text-align: center; margin: 8px 0 0; font-size: clamp(0.9rem, 3.2vw, 1rem); }
    .divider { width: 100%; height: 0; border-top: 1.5px solid #000000; margin: clamp(16px, 3vh, 22px) 0; }

    .term {
      background: #0a0a0a; color: #e8e8e8; border-radius: 12px;
      border: 1.5px solid #000000; overflow: hidden;
      box-shadow: 0 10px 28px rgba(0,0,0,0.12);
    }
    .term-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; background: #141414; border-bottom: 1px solid #222;
      font-family: 'Space Mono', monospace; font-size: 0.72rem; color: #888;
    }
    .term-dot { width: 10px; height: 10px; border-radius: 50%; background: #333; }
    .term-dot.r { background: #ff5f57; }
    .term-dot.y { background: #febc2e; }
    .term-dot.g { background: #28c840; }
    .term-body {
      padding: 14px 14px 10px; min-height: 360px; max-height: 58vh; overflow-y: auto;
      font-family: 'Space Mono', monospace; font-size: 0.84rem; line-height: 1.45;
    }
    .line { white-space: pre-wrap; word-break: break-word; margin: 0 0 6px; }
    .line.out { color: #cfcfcf; }
    .line.err { color: #ff6b6b; }
    .line.ok { color: #3ddc84; }
    .prompt-row { display: flex; align-items: flex-start; gap: 8px; margin-top: 4px; }
    .prompt { color: #3ddc84; font-weight: 700; flex: 0 0 auto; user-select: none; }
    .cmd {
      flex: 1 1 auto; min-width: 0; border: 0; outline: none; background: transparent;
      color: #ffffff; font-family: inherit; font-size: inherit; padding: 0; caret-color: #3ddc84;
    }
    .back { display: block; text-align: center; margin-top: 16px; color: #000000; font-weight: 600; font-size: 0.85rem; text-decoration: underline; }

    .corner { position: fixed; width: clamp(28px, 6vw, 56px); height: clamp(28px, 6vw, 56px); border-color: #000000; border-style: solid; border-width: 0; pointer-events: none; }
    .corner.tl { top: 0; left: 0; border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: 0; right: 0; border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: 0; left: 0; border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: 0; right: 0; border-bottom-width: 2.5px; border-right-width: 2.5px; }
  </style>
</head>
<body>
  <script src="/frame.js"></script>
  <script>
    (function () {
      FRAME.gate().then(function (active) { if (!active) return; });
    })();
  </script>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <h1 class="brand"><a class="home-link" href="/">FRAME</a></h1>

  <main class="panel">
    <h2 class="title">Command</h2>
    <p class="subtitle">Shell for this FRAME — intents, chain, grants.</p>
    <div class="divider"></div>

    <div class="term">
      <div class="term-bar">
        <span class="term-dot r"></span><span class="term-dot y"></span><span class="term-dot g"></span>
        <span>frame — command</span>
      </div>
      <div class="term-body" id="termBody">
        <div class="prompt-row">
          <span class="prompt">&gt;</span>
          <input class="cmd" id="cmd" type="text" autocomplete="off" spellcheck="false" aria-label="Command" />
        </div>
      </div>
    </div>
    <a class="back" href="/dapps.html">Back to dApps</a>
  </main>

  <script>
    (function () {
      var body = document.getElementById("termBody");
      var input = document.getElementById("cmd");
      var history = [];
      var histIdx = -1;

      function scrollBottom() { body.scrollTop = body.scrollHeight; }

      function write(text, cls) {
        var row = input.parentNode;
        var line = document.createElement("div");
        line.className = "line " + (cls || "out");
        line.textContent = text;
        body.insertBefore(line, row);
        scrollBottom();
      }

      function echoCmd(cmd) {
        var row = input.parentNode;
        var line = document.createElement("div");
        line.className = "line out";
        line.innerHTML = '<span style="color:#3ddc84;font-weight:700">&gt;</span> ' + escapeHtml(cmd);
        body.insertBefore(line, row);
      }

      function escapeHtml(s) {
        return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function logExec(line, result) {
        if (!FRAME.mutate) return Promise.resolve();
        return FRAME.mutate({
          capability: "command.exec",
          action: "command.exec",
          dapp: "frame.system.command",
          title: line.length > 48 ? line.slice(0, 48) + "…" : line,
          payload: { line: line },
          result: result || { ok: true }
        }).catch(function () {});
      }

      function help() {
        write("Commands:");
        write("  help                 this list");
        write("  id / frame           FRAME instance id");
        write("  whoami               active identity");
        write("  identities           list identities");
        write("  grants [id]          list capabilities");
        write("  grant <cap> [id]     grant a capability");
        write("  revoke <cap> [id]    revoke a capability");
        write("  chain [n]            show last n chain receipts");
        write("  head                 chain head hash");
        write("  audit                verify chain links + signatures");
        write("  intent <action> …    append a signed intent receipt");
        write("  storage              local storage usage");
        write("  dapps                list dApp keys");
        write("  open <name>          open a dApp");
        write("  clear                clear the screen");
      }

      function run(raw) {
        var line = String(raw || "").trim();
        if (!line) return;
        history.push(line);
        histIdx = history.length;
        echoCmd(line);
        var parts = line.split(/\s+/);
        var cmd = parts[0].toLowerCase();
        var arg = parts.slice(1).join(" ");
        var args = parts.slice(1);

        try { FRAME.requireCapability("command.exec"); }
        catch (err) { write(String(err.message || err), "err"); return; }

        if (cmd === "help" || cmd === "?") { help(); logExec(line, { ok: true, cmd: "help" }); return; }
        if (cmd === "clear" || cmd === "cls") {
          Array.prototype.slice.call(body.querySelectorAll(".line")).forEach(function (n) { n.remove(); });
          logExec(line, { ok: true, cmd: "clear" });
          return;
        }
        if (cmd === "id" || cmd === "frame") {
          try {
            var shell = FRAME.getFrame();
            write("FRAME id:  " + shell.id, "ok");
            write("uid:       " + shell.uid);
            if (shell.createdAt) write("created:   " + shell.createdAt);
            logExec(line, { ok: true, id: shell.id });
          } catch (e) { write("no FRAME instance", "err"); }
          return;
        }
        if (cmd === "whoami" || cmd === "identity") {
          var active = FRAME.getActive();
          if (!active) { write("no active identity", "err"); return; }
          write(active.frameId, "ok");
          write("alg: " + (FRAME.keyAlgLabel(active.publicKey) || "—"));
          logExec(line, { ok: true, id: active.frameId });
          return;
        }
        if (cmd === "identities") {
          var ids = FRAME.getIdentities();
          if (!ids.length) { write("none"); return; }
          ids.forEach(function (id, i) {
            write((i + 1) + ". " + id.frameId + (FRAME.getActive() && FRAME.getActive().frameId === id.frameId ? "  *" : ""));
          });
          logExec(line, { ok: true, count: ids.length });
          return;
        }
        if (cmd === "grants") {
          var gid = args[0] || FRAME.getActiveId();
          var caps = FRAME.listGrants(gid);
          write("grants for " + gid + " (" + caps.length + ")");
          caps.forEach(function (c) { write("  " + c); });
          logExec(line, { ok: true, count: caps.length });
          return;
        }
        if (cmd === "grant") {
          var gcap = args[0];
          var gto = args[1] || FRAME.getActiveId();
          if (!gcap) { write("usage: grant <capability> [identityId]", "err"); return; }
          FRAME.grantCapability(gto, gcap).then(function () {
            write("granted " + gcap + " → " + gto, "ok");
            logExec(line, { ok: true, capability: gcap });
          }).catch(function (err) { write(String(err.message || err), "err"); });
          return;
        }
        if (cmd === "revoke") {
          var rcap = args[0];
          var rfrom = args[1] || FRAME.getActiveId();
          if (!rcap) { write("usage: revoke <capability> [identityId]", "err"); return; }
          FRAME.revokeCapability(rfrom, rcap).then(function () {
            write("revoked " + rcap + " from " + rfrom, "ok");
            logExec(line, { ok: true, capability: rcap });
          }).catch(function (err) { write(String(err.message || err), "err"); });
          return;
        }
        if (cmd === "head") {
          var chain = FRAME.getReceiptChain();
          write(chain.head_hash || "(empty)", chain.head_hash ? "ok" : "out");
          write("next sequence: " + chain.next_sequence);
          logExec(line, { ok: true, head: chain.head_hash });
          return;
        }
        if (cmd === "chain") {
          var n = parseInt(args[0], 10); if (!n || n < 1) n = 10;
          var entries = FRAME.getReceiptChain().entries || [];
          var slice = entries.slice(-n).reverse();
          if (!slice.length) { write("(empty chain)"); logExec(line, { ok: true, count: 0 }); return; }
          slice.forEach(function (e) {
            write("#" + e.sequence + "  " + e.action + "  " + (e.title || ""));
            write("    hash " + (e.receipt_hash || "").slice(0, 20) + "…  prev " + (e.prev_hash ? e.prev_hash.slice(0, 12) + "…" : "genesis"));
          });
          logExec(line, { ok: true, shown: slice.length });
          return;
        }
        if (cmd === "audit") {
          write("auditing…");
          FRAME.auditReceiptChain().then(function (r) {
            write(r.ok ? "Chain OK" : "Chain FAIL", r.ok ? "ok" : "err");
            write(r.count + " entries");
            if (r.broken_links && r.broken_links.length) write("broken links: " + r.broken_links.length, "err");
            if (r.bad_signatures && r.bad_signatures.length) write("bad signatures: " + r.bad_signatures.length, "err");
            if (r.missing_signers && r.missing_signers.length) write("missing signers: " + r.missing_signers.length, "err");
            return FRAME.mutate({
              capability: "chain.verify",
              action: "chain.audit",
              dapp: "frame.system.receipt_audit",
              title: r.ok ? "audit OK" : "audit FAIL",
              payload: { via: "command" },
              result: { ok: r.ok, count: r.count }
            }).then(function () { logExec(line, { ok: r.ok }); });
          }).catch(function (err) { write(String(err.message || err), "err"); });
          return;
        }
        if (cmd === "intent") {
          if (!arg) { write("usage: intent <action> [json-or-text]", "err"); return; }
          var iaction = args[0];
          var irest = args.slice(1).join(" ");
          var ipayload = irest;
          try { if (irest && (irest.charAt(0) === "{" || irest.charAt(0) === "[")) ipayload = JSON.parse(irest); } catch (e) {}
          FRAME.mutate({
            capability: "command.exec",
            action: iaction,
            dapp: "frame.system.command",
            title: "intent · " + iaction,
            payload: ipayload,
            result: { ok: true, via: "intent" }
          }).then(function (entry) {
            write("appended #" + entry.sequence + "  " + entry.receipt_hash.slice(0, 20) + "…", "ok");
            logExec(line, { ok: true, id: entry.id });
          }).catch(function (err) { write(String(err.message || err), "err"); });
          return;
        }
        if (cmd === "storage") {
          var bytes = FRAME.localStorageBytes();
          write(FRAME.humanBytesLong(bytes) + " in localStorage (" + FRAME.localStorageEntries().length + " keys)");
          if (navigator.storage && navigator.storage.estimate) {
            navigator.storage.estimate().then(function (est) {
              var u = est.usage || 0, q = est.quota || 0;
              write("browser: " + FRAME.humanBytesLong(u) + " used of " + FRAME.humanBytesLong(q) +
                " · " + FRAME.humanBytesLong(Math.max(0, q - u)) + " free");
            });
          }
          logExec(line, { ok: true });
          return;
        }
        if (cmd === "dapps") {
          var n = 0;
          FRAME.localStorageEntries().forEach(function (e) {
            if (e.name.indexOf("frame.dapp.") !== 0) return;
            n++;
            var d = null; try { d = JSON.parse(localStorage.getItem(e.name)); } catch (x) {}
            write(e.name + (d && d.name ? "  (" + d.name + ")" : ""));
          });
          if (!n) write("no dApp data yet");
          logExec(line, { ok: true, count: n });
          return;
        }
        if (cmd === "open") {
          var map = {
            wallet: "/wallet.html", calc: "/calculator.html", calculator: "/calculator.html",
            timer: "/timer.html", storage: "/storage.html", cloud: "/cloud.html", dapps: "/dapps.html",
            command: "/command.html", welcome: "/", home: "/", receipts: "/wallet.html#receipts"
          };
          var key = (arg || "").toLowerCase();
          if (map[key]) {
            write("opening " + key + "…", "ok");
            logExec(line, { ok: true, target: key }).then(function () {
              window.location.href = map[key];
            });
          } else write("unknown target. try: wallet, calc, storage, cloud, dapps, receipts, welcome", "err");
          return;
        }
        write("unknown command: " + cmd + "  (type help)", "err");
        logExec(line, { ok: false, error: "unknown" });
      }

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          var v = input.value;
          input.value = "";
          run(v);
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          if (!history.length) return;
          histIdx = Math.max(0, histIdx - 1);
          input.value = history[histIdx] || "";
        } else if (e.key === "ArrowDown") {
          e.preventDefault();
          histIdx = Math.min(history.length, histIdx + 1);
          input.value = histIdx >= history.length ? "" : (history[histIdx] || "");
        }
      });

      write("FRAME command shell. Type help.");
      try {
        var shell = FRAME.getFrame();
        write("instance " + shell.id + " · " + shell.uid);
        var chain = FRAME.getReceiptChain();
        write("chain head " + (chain.head_hash ? chain.head_hash.slice(0, 16) + "… (#" + Math.max(0, chain.next_sequence - 1) + ")" : "(empty)"));
      } catch (e) {}
      input.focus();
      document.addEventListener("click", function () { input.focus(); });
    })();
  </script>
</body>
</html>
