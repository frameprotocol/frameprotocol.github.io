<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #ffffff; min-height: 100%; }
    body {
      color: #000000;
      -webkit-font-smoothing: antialiased;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: clamp(64px, 12vh, 96px) 0 clamp(48px, 8vh, 72px);
    }
    .home-link { color: inherit; text-decoration: none; }
    .brand {
      position: fixed; top: 8px; left: 8px; margin: 0; z-index: 6;
      font-family: 'Chakra Petch', sans-serif; font-weight: 700; color: #000000;
      font-size: clamp(18px, 5vw, 40px); letter-spacing: 0.08em; line-height: 1;
    }

    .panel { width: min(92vw, 560px); }
    .title {
      font-family: 'Chakra Petch', sans-serif; font-weight: 700;
      letter-spacing: 0.03em; font-size: clamp(1.5rem, 6vw, 2.1rem);
      margin: 0; text-align: center;
    }
    .subtitle {
      color: #666666; font-weight: 500; text-align: center;
      margin: 8px 0 0; font-size: clamp(0.9rem, 3.2vw, 1rem);
    }
    .divider { width: 100%; height: 0; border-top: 1.5px solid #000000; margin: clamp(16px, 3vh, 22px) 0; }

    .section-label {
      font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      font-size: 0.72rem; color: #888888; margin: clamp(24px, 4vh, 32px) 0 14px;
    }

    .dev { margin-bottom: clamp(14px, 2.6vh, 20px); }
    .dev-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .dev-name {
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: clamp(1rem, 4.2vw, 1.2rem);
    }
    .dev-tag {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 2px 7px; border: 1px solid #000000;
    }
    .dev-tag.on { background: #17a34a; border-color: #17a34a; color: #ffffff; }
    .dev-browser { font-family: 'Space Mono', monospace; font-weight: 700; color: #888888; font-size: clamp(0.82rem, 3.2vw, 0.95rem); }

    .bar {
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: clamp(0.85rem, 3.4vw, 1.05rem);
      letter-spacing: 0; line-height: 1.2; margin: 10px 0 8px;
      white-space: nowrap; overflow-x: auto;
    }
    .bar .used { color: #000000; }
    .bar .free { color: #c8c8c8; }
    .bar .pct { color: #000000; }
    .legend {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.75rem, 3vw, 0.88rem); color: #444444;
    }
    .legend b { color: #000000; }

    .kv {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.75rem, 3vw, 0.88rem); color: #444444;
      margin-top: 4px;
    }
    .kv b { color: #000000; }

    .breakdown { margin-top: 12px; }
    .breakdown .row {
      display: flex; justify-content: space-between; gap: 12px;
      font-family: 'Space Mono', monospace; font-size: clamp(0.75rem, 3vw, 0.88rem);
      padding: 5px 0; border-bottom: 1px solid #eeeeee;
    }
    .breakdown .row:last-child { border-bottom: 0; }
    .breakdown .row .k { color: #444444; }
    .breakdown .row .v { color: #000000; font-weight: 700; }

    .empty {
      border: 1.5px dashed #cccccc; padding: 16px; text-align: center;
      color: #888888; font-size: 0.9rem;
    }
    .note { color: #888888; font-size: 0.8rem; margin-top: 6px; line-height: 1.4; }

    .corner {
      position: fixed; width: clamp(28px, 6vw, 56px); height: clamp(28px, 6vw, 56px);
      border-color: #000000; border-style: solid; border-width: 0; pointer-events: none;
    }
    .corner.tl { top: 0; left: 0; border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: 0; right: 0; border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: 0; left: 0; border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: 0; right: 0; border-bottom-width: 2.5px; border-right-width: 2.5px; }
  </style>
</head>
<body>
  <script src="/frame.js"></script>
  <script>
    (function () {
      try {
        var idents = FRAME.getIdentities();
        if (idents.length === 0) { window.location.replace("/dashboard.html"); return; }
        var active = FRAME.getActive();
        if (!active) { window.location.replace("/identity.html"); return; }
        if (!FRAME.isUnlocked(active.frameId)) { window.location.replace("/unlock.html"); }
      } catch (e) {}
    })();
  </script>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <h1 class="brand"><a class="home-link" href="/">FRAME</a></h1>

  <main class="panel">
    <h2 class="title">Storage</h2>
    <p class="subtitle">Real usage reported by this browser.</p>
    <div class="divider"></div>

    <div class="section-label">This device</div>
    <div id="thisDevice"></div>

    <div class="section-label">Connected devices</div>
    <div id="connected"></div>
  </main>

  <script>
    (function () {
      var BAR_WIDTH = 34;

      function humanBytes(n) {
        if (n === null || n === undefined || isNaN(n)) return "unknown";
        var units = ["B", "KB", "MB", "GB", "TB", "PB"];
        var i = 0, v = n;
        while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
        var dp = (v >= 100 || i === 0) ? 0 : (v >= 10 ? 1 : 2);
        return v.toFixed(dp) + " " + units[i];
      }

      function barHTML(used, total) {
        var pct = total > 0 ? Math.min(1, used / total) : 0;
        var filled = Math.round(pct * BAR_WIDTH);
        if (used > 0 && filled === 0) filled = 1;
        if (used < total && filled === BAR_WIDTH) filled = BAR_WIDTH - 1;
        var usedStr = "", freeStr = "";
        for (var i = 0; i < filled; i++) usedStr += "\u2501";              // heavy
        for (var j = 0; j < BAR_WIDTH - filled; j++) freeStr += "\u2500";  // light
        var pctTxt = (pct * 100).toFixed(pct * 100 >= 10 ? 0 : 2) + "%";
        return '[<span class="used">' + usedStr + '</span><span class="free">' + freeStr + '</span>] <span class="pct">' + pctTxt + '</span>';
      }

      function localStorageBytes() {
        var total = 0;
        try {
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            var v = localStorage.getItem(k) || "";
            total += (k.length + v.length) * 2; // UTF-16 code units
          }
        } catch (e) {}
        return total;
      }

      function browserName() {
        var ua = navigator.userAgent;
        if (navigator.brave) return "brave";
        if (/Edg\//.test(ua)) return "edge";
        if (/OPR\//.test(ua) || /\bOpera\b/.test(ua)) return "opera";
        if (/Firefox\//.test(ua)) return "firefox";
        if (/Chrome\//.test(ua)) return "chrome";
        if (/Safari\//.test(ua) && /Version\//.test(ua)) return "safari";
        return "browser";
      }

      var thisDevice = document.getElementById("thisDevice");

      function renderThisDevice(est, persisted) {
        var localBytes = localStorageBytes();
        var estUsage = (est && typeof est.usage === "number") ? est.usage : 0;
        // estimate() usually excludes localStorage, so make sure our real
        // localStorage footprint is reflected rather than reading as 0.
        var usage = Math.max(estUsage, localBytes);
        var quota = (est && typeof est.quota === "number") ? est.quota : null;

        var dev = document.createElement("div");
        dev.className = "dev";

        var head = document.createElement("div");
        head.className = "dev-head";
        var nm = document.createElement("span");
        nm.className = "dev-name";
        nm.textContent = "this browser";
        head.appendChild(nm);
        var bn = document.createElement("span");
        bn.className = "dev-browser";
        bn.textContent = "(" + browserName() + ")";
        head.appendChild(bn);
        var tag = document.createElement("span");
        tag.className = "dev-tag on";
        tag.textContent = "this device";
        head.appendChild(tag);
        dev.appendChild(head);

        if (quota !== null && quota > 0) {
          var free = Math.max(0, quota - usage);
          var bar = document.createElement("div");
          bar.className = "bar";
          bar.innerHTML = barHTML(usage, quota);
          dev.appendChild(bar);

          var legend = document.createElement("div");
          legend.className = "legend";
          legend.innerHTML = "Used <b>" + humanBytes(usage) + "</b> \u00b7 Free <b>" + humanBytes(free) + "</b> \u00b7 Allowance <b>" + humanBytes(quota) + "</b>";
          dev.appendChild(legend);
        } else {
          var legend2 = document.createElement("div");
          legend2.className = "legend";
          legend2.innerHTML = "Used <b>" + humanBytes(usage) + "</b> \u00b7 Allowance <b>unknown</b>";
          dev.appendChild(legend2);
        }

        var kv = document.createElement("div");
        kv.className = "kv";
        kv.innerHTML = "Persistent storage: <b>" + (persisted === true ? "granted" : persisted === false ? "not granted (may be evicted)" : "unknown") + "</b>";
        dev.appendChild(kv);

        // Real per-type breakdown.
        var bd = document.createElement("div");
        bd.className = "breakdown";
        var bdRow = document.createElement("div");
        bdRow.className = "row";
        bdRow.innerHTML = '<span class="k">localStorage (FRAME data)</span><span class="v">' + humanBytes(localBytes) + '</span>';
        bd.appendChild(bdRow);
        if (est && est.usageDetails && typeof est.usageDetails === "object") {
          Object.keys(est.usageDetails).forEach(function (k) {
            var row = document.createElement("div");
            row.className = "row";
            row.innerHTML = '<span class="k">' + k + '</span><span class="v">' + humanBytes(est.usageDetails[k]) + '</span>';
            bd.appendChild(row);
          });
        }
        dev.appendChild(bd);

        var note = document.createElement("div");
        note.className = "note";
        note.textContent = "Browsers report an allowance for this site (a share of free disk), not the computer's true total capacity. Exact disk size is not exposed to web pages.";
        dev.appendChild(note);

        thisDevice.appendChild(dev);
      }

      function renderConnected() {
        var container = document.getElementById("connected");
        var empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No connected devices. Device-to-device sync is not available from the browser yet.";
        container.appendChild(empty);
      }

      function go(est) {
        var p = (navigator.storage && navigator.storage.persisted)
          ? navigator.storage.persisted() : Promise.resolve(null);
        p.then(function (persisted) {
          renderThisDevice(est, persisted);
          renderConnected();
        }).catch(function () {
          renderThisDevice(est, null);
          renderConnected();
        });
      }

      if (navigator.storage && navigator.storage.estimate) {
        navigator.storage.estimate().then(go).catch(function () { go(null); });
      } else {
        go(null);
      }
    })();
  </script>
</body>
</html>
