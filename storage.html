<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #ffffff; min-height: 100%; }
    body {
      color: #000000;
      -webkit-font-smoothing: antialiased;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: clamp(64px, 12vh, 96px) 0 clamp(48px, 8vh, 72px);
    }
    .home-link { color: inherit; text-decoration: none; }
    .brand {
      position: fixed; top: 8px; left: 8px; margin: 0; z-index: 6;
      font-family: 'Chakra Petch', sans-serif; font-weight: 700; color: #000000;
      font-size: clamp(18px, 5vw, 40px); letter-spacing: 0.08em; line-height: 1;
    }

    .panel { width: min(92vw, 560px); }
    .title {
      font-family: 'Chakra Petch', sans-serif; font-weight: 700;
      letter-spacing: 0.03em; font-size: clamp(1.5rem, 6vw, 2.1rem);
      margin: 0; text-align: center;
    }
    .subtitle {
      color: #666666; font-weight: 500; text-align: center;
      margin: 8px 0 0; font-size: clamp(0.9rem, 3.2vw, 1rem);
    }
    .divider { width: 100%; height: 0; border-top: 1.5px solid #000000; margin: clamp(16px, 3vh, 22px) 0; }

    .section-label {
      font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      font-size: 0.72rem; color: #888888; margin: clamp(24px, 4vh, 32px) 0 14px;
    }

    .dev { margin-bottom: clamp(18px, 3.4vh, 26px); }
    .dev-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .dev-name {
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: clamp(1rem, 4.2vw, 1.2rem);
    }
    .dev-tag {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 2px 7px; border: 1px solid #000000;
    }
    .dev-tag.on { background: #17a34a; border-color: #17a34a; color: #ffffff; }
    .dev-tag.off { background: #f2f2f2; color: #999999; border-color: #cccccc; }

    .bar {
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: clamp(0.85rem, 3.4vw, 1.05rem);
      letter-spacing: 0; line-height: 1.2; margin: 10px 0 8px;
      white-space: nowrap; overflow-x: auto;
    }
    .bar .used { color: #000000; }
    .bar .free { color: #c8c8c8; }
    .bar .pct { color: #000000; }
    .legend {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.75rem, 3vw, 0.88rem); color: #444444;
    }
    .legend b { color: #000000; }

    .totals {
      border: 1.5px solid #000000; padding: 14px 16px; margin-top: 6px;
      font-family: 'Space Mono', monospace; font-size: clamp(0.8rem, 3vw, 0.92rem);
    }
    .totals .bar { margin-top: 8px; }

    .note { color: #888888; font-size: 0.8rem; margin-top: 6px; }

    .corner {
      position: fixed; width: clamp(28px, 6vw, 56px); height: clamp(28px, 6vw, 56px);
      border-color: #000000; border-style: solid; border-width: 0; pointer-events: none;
    }
    .corner.tl { top: 0; left: 0; border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: 0; right: 0; border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: 0; left: 0; border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: 0; right: 0; border-bottom-width: 2.5px; border-right-width: 2.5px; }
  </style>
</head>
<body>
  <script src="/frame.js"></script>
  <script>
    (function () {
      try {
        var idents = FRAME.getIdentities();
        if (idents.length === 0) { window.location.replace("/dashboard.html"); return; }
        var active = FRAME.getActive();
        if (!active) { window.location.replace("/identity.html"); return; }
        if (!FRAME.isUnlocked(active.frameId)) { window.location.replace("/unlock.html"); }
      } catch (e) {}
    })();
  </script>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <h1 class="brand"><a class="home-link" href="/">FRAME</a></h1>

  <main class="panel">
    <h2 class="title">Storage</h2>
    <p class="subtitle">Space used across this device and connected FRAMEs.</p>
    <div class="divider"></div>

    <div class="section-label">This device</div>
    <div id="thisDevice"></div>

    <div class="section-label">Connected devices</div>
    <div id="connected"></div>

    <div class="section-label">Total across identities</div>
    <div id="totals" class="totals"></div>
  </main>

  <script>
    (function () {
      var BAR_WIDTH = 34;

      function humanBytes(n) {
        if (n === null || n === undefined || isNaN(n)) return "—";
        var units = ["B", "KB", "MB", "GB", "TB", "PB"];
        var i = 0;
        var v = n;
        while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
        var dp = (v >= 100 || i === 0) ? 0 : (v >= 10 ? 1 : 2);
        return v.toFixed(dp) + " " + units[i];
      }

      function barHTML(used, total) {
        var pct = total > 0 ? Math.min(1, used / total) : 0;
        var filled = Math.round(pct * BAR_WIDTH);
        if (used > 0 && filled === 0) filled = 1;
        if (used < total && filled === BAR_WIDTH) filled = BAR_WIDTH - 1;
        var usedStr = "";
        var freeStr = "";
        for (var i = 0; i < filled; i++) usedStr += "\u2501";        // ━ heavy
        for (var j = 0; j < BAR_WIDTH - filled; j++) freeStr += "\u2500"; // ─ light
        var pctTxt = (pct * 100).toFixed(pct * 100 >= 10 ? 0 : 1) + "%";
        return '[<span class="used">' + usedStr + '</span><span class="free">' + freeStr + '</span>] <span class="pct">' + pctTxt + '</span>';
      }

      function renderDevice(container, name, used, total, online, tag) {
        var free = Math.max(0, total - used);
        var dev = document.createElement("div");
        dev.className = "dev";

        var head = document.createElement("div");
        head.className = "dev-head";
        var nm = document.createElement("span");
        nm.className = "dev-name";
        nm.textContent = name;
        head.appendChild(nm);
        var t = document.createElement("span");
        t.className = "dev-tag " + (online ? "on" : "off");
        t.textContent = online ? "online" : "offline";
        head.appendChild(t);
        dev.appendChild(head);

        var bar = document.createElement("div");
        bar.className = "bar";
        bar.innerHTML = barHTML(used, total);
        dev.appendChild(bar);

        var legend = document.createElement("div");
        legend.className = "legend";
        legend.innerHTML = "Used <b>" + humanBytes(used) + "</b> \u00b7 Free <b>" + humanBytes(free) + "</b> \u00b7 Total <b>" + humanBytes(total) + "</b>";
        dev.appendChild(legend);

        if (tag) {
          var note = document.createElement("div");
          note.className = "note";
          note.textContent = tag;
          dev.appendChild(note);
        }

        container.appendChild(dev);
      }

      // Simulated connected FRAME nodes (no live functionality yet).
      var connectedDevices = [
        { name: "living-room.local", used: 214 * 1e9, total: 512 * 1e9, online: true },
        { name: "studio-frame",      used: 903 * 1e9, total: 1e12,      online: true },
        { name: "nas-frame",         used: 3.1e12,    total: 8e12,      online: true },
        { name: "office-frame",      used: 47 * 1e9,  total: 256 * 1e9, online: false }
      ];

      var totalUsed = 0, totalCap = 0;

      function renderConnected() {
        var container = document.getElementById("connected");
        connectedDevices.forEach(function (d) {
          renderDevice(container, d.name, d.used, d.total, d.online, null);
          totalUsed += d.used;
          totalCap += d.total;
        });
        renderTotals();
      }

      function renderTotals() {
        var el = document.getElementById("totals");
        var free = Math.max(0, totalCap - totalUsed);
        el.innerHTML =
          "Used <b>" + humanBytes(totalUsed) + "</b> \u00b7 Free <b>" + humanBytes(free) + "</b> \u00b7 Total <b>" + humanBytes(totalCap) + "</b>" +
          '<div class="bar">' + barHTML(totalUsed, totalCap) + "</div>";
      }

      function start(used, total) {
        renderDevice(
          document.getElementById("thisDevice"),
          "this device",
          used, total, true,
          "Browser storage allowance for this FRAME."
        );
        totalUsed += used;
        totalCap += total;
        renderConnected();
      }

      if (navigator.storage && navigator.storage.estimate) {
        navigator.storage.estimate().then(function (est) {
          start(est.usage || 0, est.quota || 0);
        }).catch(function () {
          start(0, 0);
        });
      } else {
        // Fallback estimate if the Storage API is unavailable.
        start(5 * 1e6, 2 * 1e9);
      }
    })();
  </script>
</body>
</html>
