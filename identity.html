<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #ffffff; min-height: 100%; }
    body {
      color: #000000;
      -webkit-font-smoothing: antialiased;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: clamp(64px, 12vh, 96px) 0 clamp(48px, 8vh, 72px);
    }
    .home-link { color: inherit; text-decoration: none; }
    .brand {
      position: fixed; top: 8px; left: 8px; margin: 0; z-index: 6;
      font-family: 'Chakra Petch', sans-serif; font-weight: 700; color: #000000;
      font-size: clamp(18px, 5vw, 40px); letter-spacing: 0.08em; line-height: 1;
    }

    .panel { width: min(92vw, 480px); }
    .title {
      font-family: 'Chakra Petch', sans-serif; font-weight: 700;
      letter-spacing: 0.03em; font-size: clamp(1.5rem, 6vw, 2.1rem);
      margin: 0; text-align: center;
    }
    .subtitle {
      color: #666666; font-weight: 500; text-align: center;
      margin: 8px 0 0; font-size: clamp(0.9rem, 3.2vw, 1rem);
    }
    .detected {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      margin-top: 8px; color: #17a34a; font-weight: 600; font-size: 0.78rem;
    }
    .detected .dot { width: 7px; height: 7px; border-radius: 50%; background: #17a34a; }
    .divider { width: 100%; height: 0; border-top: 1.5px solid #000000; margin: clamp(16px, 3vh, 22px) 0; }

    .section-label {
      font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      font-size: 0.72rem; color: #888888; margin: clamp(22px, 4vh, 30px) 0 12px;
    }

    /* Identity list */
    .ident {
      border: 1.5px solid #000000; padding: 14px 15px;
      margin-bottom: clamp(10px, 1.8vh, 14px);
    }
    .ident.active { border-width: 2.5px; }
    .ident-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .ident-id {
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: clamp(1rem, 4.4vw, 1.25rem); word-break: break-all;
    }
    .badge {
      font-size: 0.66rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 2px 7px; border: 1px solid #000000;
    }
    .badge.on { background: #000000; color: #ffffff; }
    .badge.lock { background: #ffe08a; border-color: #b8860b; color: #7a5c00; }
    .badge.open { background: #e9f7ef; border-color: #17a34a; color: #0f7a3d; }
    .ident-meta { color: #999999; font-size: 0.78rem; margin-top: 6px; }
    .ident-actions { display: flex; gap: 10px; margin-top: 12px; }
    .mini {
      flex: 1; text-align: center; cursor: pointer;
      border: 1.5px solid #000000; background: #ffffff; color: #000000;
      padding: 9px 12px; font-family: 'Space Grotesk', sans-serif; font-weight: 600;
      font-size: 0.9rem; text-decoration: none;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .mini:hover { background: #000000; color: #ffffff; }
    .mini.danger { border-color: #c1121f; color: #c1121f; }
    .mini.danger:hover { background: #c1121f; color: #ffffff; }
    .mini.solid { background: #000000; color: #ffffff; }
    .mini.solid:hover { background: #ffffff; color: #000000; }

    /* Row inline pin */
    .rowpin { display: none; gap: 10px; margin-top: 12px; }
    .rowpin.show { display: flex; }
    .rowpin input {
      flex: 1; min-width: 0; text-align: center;
      border: 1.5px solid #000000; padding: 10px;
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: 1.2rem; letter-spacing: 0.4em; text-indent: 0.4em;
    }

    .empty { text-align: center; color: #666666; padding: 8px 0 4px; }

    /* Active details */
    .field-label {
      font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      font-size: 0.72rem; color: #888888; margin: clamp(14px, 2.6vh, 20px) 0 8px;
    }
    .keybox {
      border: 1.5px solid #000000; padding: 14px 16px; text-align: center;
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: clamp(0.95rem, 4vw, 1.25rem); letter-spacing: 0.12em; word-break: break-all;
    }
    .reveal {
      display: inline-block; margin-top: 8px; cursor: pointer;
      background: none; border: 0; padding: 0; color: #000000;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600;
      font-size: 0.85rem; text-decoration: underline;
    }
    .row { margin-bottom: clamp(16px, 3vh, 22px); }
    .row-label { font-weight: 600; font-size: clamp(0.95rem, 3.4vw, 1.05rem); }
    .row-desc { color: #666666; font-size: clamp(0.82rem, 3vw, 0.92rem); margin: 3px 0 10px; line-height: 1.35; }
    .controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .field {
      border: 1.5px solid #000000; padding: 11px 12px;
      font-family: 'Space Grotesk', sans-serif; font-size: 0.95rem;
      background: #ffffff; color: #000000; width: 120px;
    }
    .field:disabled { background: #f2f2f2; color: #999999; }
    select.field { width: auto; min-width: 230px; }
    .check { display: inline-flex; align-items: center; gap: 8px; font-weight: 500; cursor: pointer; user-select: none; }
    .check input { width: 18px; height: 18px; accent-color: #000000; }

    .btn {
      display: block; width: 100%; box-sizing: border-box;
      padding: clamp(12px, 2.4vh, 16px) 18px; margin-top: clamp(12px, 2.2vh, 18px);
      background: #000000; color: #ffffff; border: 1.5px solid #000000;
      text-align: center; text-decoration: none;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600;
      letter-spacing: 0.02em; font-size: clamp(0.98rem, 3.6vw, 1.1rem); cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .btn:hover { background: #ffffff; color: #000000; }
    .btn.ghost { background: #ffffff; color: #000000; }
    .btn.ghost:hover { background: #000000; color: #ffffff; }
    .saved { text-align: center; color: #17a34a; font-weight: 600; min-height: 1.2em; margin-top: 10px; font-size: 0.9rem; }
    .saved.err { color: #c1121f; }
    .locknote { text-align: center; color: #7a5c00; background: #fff6de; border: 1.5px solid #b8860b; padding: 12px; font-weight: 600; font-size: 0.9rem; }

    .corner {
      position: fixed; width: clamp(28px, 6vw, 56px); height: clamp(28px, 6vw, 56px);
      border-color: #000000; border-style: solid; border-width: 0; pointer-events: none;
    }
    .corner.tl { top: 0; left: 0; border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: 0; right: 0; border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: 0; left: 0; border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: 0; right: 0; border-bottom-width: 2.5px; border-right-width: 2.5px; }
  </style>
</head>
<body>
  <script src="/frame.js"></script>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <h1 class="brand"><a class="home-link" href="/">FRAME</a></h1>

  <main class="panel">
    <h2 class="title">Identity</h2>
    <p class="subtitle">Manage the FRAME identities on this device.</p>
    <div class="detected"><span class="dot"></span><span>Stored via this browser's storage</span></div>
    <div class="divider"></div>

    <div class="section-label">Your identities</div>
    <div id="idList"></div>

    <div id="activeArea"></div>

    <div class="section-label">Add another</div>
    <a class="btn" href="/create.html">Create identity</a>
    <a class="btn ghost" href="/connect.html">Connect to existing identity</a>
  </main>

  <script>
    (function () {
      var idList = document.getElementById("idList");
      var activeArea = document.getElementById("activeArea");

      function fmtDate(iso) {
        try { return new Date(iso).toLocaleString(); } catch (e) { return ""; }
      }

      function useIdentity(id) {
        FRAME.setActiveId(id);
        if (FRAME.isUnlocked(id)) window.location.href = "/dashboard.html";
        else window.location.href = "/unlock.html";
      }

      function deleteIdentity(id) {
        if (!confirm("Delete " + id + " from this device? This cannot be undone without the recovery key.")) return;
        FRAME.removeIdentity(id);
        render();
      }

      function render() {
        var idents = FRAME.getIdentities();
        var activeId = FRAME.getActiveId();
        idList.innerHTML = "";

        if (idents.length === 0) {
          var empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No identities on this device yet.";
          idList.appendChild(empty);
        }

        idents.forEach(function (ident) {
          var isActive = ident.frameId === activeId;
          var unlocked = FRAME.isUnlocked(ident.frameId);

          var wrap = document.createElement("div");
          wrap.className = "ident" + (isActive ? " active" : "");

          var top = document.createElement("div");
          top.className = "ident-top";
          var idEl = document.createElement("span");
          idEl.className = "ident-id";
          idEl.textContent = ident.frameId;
          top.appendChild(idEl);

          if (isActive) { var b = document.createElement("span"); b.className = "badge on"; b.textContent = "Active"; top.appendChild(b); }
          if (ident.passcode) {
            if (ident.locked) { var bl = document.createElement("span"); bl.className = "badge lock"; bl.textContent = "Locked"; top.appendChild(bl); }
            else { var bp = document.createElement("span"); bp.className = "badge"; bp.textContent = "Passcode"; top.appendChild(bp); }
          } else {
            var bo = document.createElement("span"); bo.className = "badge open"; bo.textContent = "No passcode"; top.appendChild(bo);
          }
          wrap.appendChild(top);

          var meta = document.createElement("div");
          meta.className = "ident-meta";
          meta.textContent = "Created " + fmtDate(ident.createdAt);
          wrap.appendChild(meta);

          var actions = document.createElement("div");
          actions.className = "ident-actions";

          var useBtn = document.createElement("button");
          useBtn.className = "mini solid";
          useBtn.type = "button";
          if (isActive && unlocked) { useBtn.textContent = "Open"; }
          else if (ident.passcode && !unlocked) { useBtn.textContent = "Log in"; }
          else { useBtn.textContent = "Use"; }
          useBtn.addEventListener("click", function () { useIdentity(ident.frameId); });
          actions.appendChild(useBtn);

          var delBtn = document.createElement("button");
          delBtn.className = "mini danger";
          delBtn.type = "button";
          delBtn.textContent = "Delete";
          delBtn.addEventListener("click", function () { deleteIdentity(ident.frameId); });
          actions.appendChild(delBtn);

          wrap.appendChild(actions);
          idList.appendChild(wrap);
        });

        renderActive();
      }

      function renderActive() {
        activeArea.innerHTML = "";
        var active = FRAME.getActive();
        if (!active) return;

        var label = document.createElement("div");
        label.className = "section-label";
        label.textContent = "Active identity";
        activeArea.appendChild(label);

        if (active.passcode && !FRAME.isUnlocked(active.frameId)) {
          var note = document.createElement("div");
          note.className = "locknote";
          note.innerHTML = "Log in to this identity to manage its recovery key and settings.";
          activeArea.appendChild(note);
          var loginBtn = document.createElement("button");
          loginBtn.className = "btn";
          loginBtn.type = "button";
          loginBtn.textContent = "Log in";
          loginBtn.addEventListener("click", function () { useIdentity(active.frameId); });
          activeArea.appendChild(loginBtn);
          return;
        }

        // Recovery key
        var recLabel = document.createElement("div");
        recLabel.className = "field-label";
        recLabel.textContent = "recovery key";
        activeArea.appendChild(recLabel);
        var keyBox = document.createElement("div");
        keyBox.className = "keybox";
        keyBox.textContent = "•••••••••••••••••";
        activeArea.appendChild(keyBox);
        var revealBtn = document.createElement("button");
        revealBtn.className = "reveal";
        revealBtn.type = "button";
        revealBtn.textContent = "Reveal recovery key";
        var revealed = false;
        revealBtn.addEventListener("click", function () {
          revealed = !revealed;
          keyBox.textContent = revealed ? (active.recoveryKey || "") : "•••••••••••••••••";
          revealBtn.textContent = revealed ? "Hide recovery key" : "Reveal recovery key";
        });
        activeArea.appendChild(revealBtn);

        // Passcode set / change
        var pcLabel = document.createElement("div");
        pcLabel.className = "field-label";
        pcLabel.textContent = active.passcode ? "change passcode" : "set passcode";
        activeArea.appendChild(pcLabel);
        var pcRow = document.createElement("div");
        pcRow.className = "controls";
        var pcInput = document.createElement("input");
        pcInput.className = "field";
        pcInput.type = "password";
        pcInput.inputMode = "numeric";
        pcInput.setAttribute("pattern", "[0-9]*");
        pcInput.maxLength = 5;
        pcInput.placeholder = "5 digits";
        pcInput.style.width = "120px";
        pcInput.addEventListener("input", function () { pcInput.value = pcInput.value.replace(/\D/g, "").slice(0, 5); });
        var pcBtn = document.createElement("button");
        pcBtn.className = "mini solid";
        pcBtn.type = "button";
        pcBtn.style.flex = "none";
        pcBtn.textContent = "Save";
        pcBtn.addEventListener("click", function () {
          if (pcInput.value.length !== 5) { flash("Passcode must be 5 digits.", true); return; }
          active.passcode = pcInput.value;
          FRAME.updateIdentity(active);
          FRAME.markUnlocked(active.frameId);
          pcInput.value = "";
          flash("Passcode saved.");
          render();
        });
        pcRow.appendChild(pcInput);
        pcRow.appendChild(pcBtn);
        activeArea.appendChild(pcRow);

        // Attempt settings
        var secForm = document.createElement("form");
        secForm.innerHTML =
          '<div class="row" style="margin-top:18px">' +
            '<div class="row-label">Incorrect passcode attempts</div>' +
            '<div class="row-desc">How many wrong tries before the limit action runs.</div>' +
            '<div class="controls">' +
              '<input class="field" id="maxAttempts" type="number" min="1" max="999" inputmode="numeric" value="5" />' +
              '<label class="check"><input type="checkbox" id="unlimited" /> Unlimited</label>' +
            '</div>' +
          '</div>' +
          '<div class="row">' +
            '<div class="row-label">When the limit is reached</div>' +
            '<div class="row-desc">What happens after too many incorrect attempts.</div>' +
            '<div class="controls">' +
              '<select class="field" id="onLimit">' +
                '<option value="lock">Lock this device (require recovery)</option>' +
                '<option value="wipe">Erase this identity from this device</option>' +
              '</select>' +
            '</div>' +
          '</div>' +
          '<button class="btn" type="submit">Save settings</button>' +
          '<div class="saved" id="savedMsg"></div>';
        activeArea.appendChild(secForm);

        var settings = active.settings || { maxAttempts: 5, onLimit: "lock" };
        var maxAttempts = secForm.querySelector("#maxAttempts");
        var unlimited = secForm.querySelector("#unlimited");
        var onLimit = secForm.querySelector("#onLimit");
        if (settings.maxAttempts === null || settings.maxAttempts === undefined) { unlimited.checked = true; maxAttempts.disabled = true; }
        else { maxAttempts.value = settings.maxAttempts; }
        onLimit.value = settings.onLimit || "lock";
        unlimited.addEventListener("change", function () { maxAttempts.disabled = unlimited.checked; });

        secForm.addEventListener("submit", function (e) {
          e.preventDefault();
          var max;
          if (unlimited.checked) { max = null; }
          else {
            max = parseInt(maxAttempts.value, 10);
            if (isNaN(max) || max < 1) max = 1;
            if (max > 999) max = 999;
            maxAttempts.value = max;
          }
          active.settings = { maxAttempts: max, onLimit: onLimit.value };
          FRAME.updateIdentity(active);
          flash("Settings saved.");
        });

        // Sign out
        var signOut = document.createElement("button");
        signOut.className = "btn ghost";
        signOut.type = "button";
        signOut.textContent = "Sign out";
        signOut.addEventListener("click", function () {
          FRAME.lockSession();
          if (active.passcode) window.location.href = "/unlock.html";
          else render();
        });
        activeArea.appendChild(signOut);
      }

      function flash(msg, isErr) {
        var el = document.getElementById("savedMsg");
        if (!el) { alert(msg); return; }
        el.textContent = msg;
        el.className = "saved" + (isErr ? " err" : "");
        setTimeout(function () { if (el) { el.textContent = ""; } }, 2500);
      }

      render();
    })();
  </script>
</body>
</html>
