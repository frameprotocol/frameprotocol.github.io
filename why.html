<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }
    .stage {
      margin-top: clamp(20px, 4vh, 48px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(12px, 2.5vh, 24px);
      padding: 0 24px;
    }
    h1 {
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 700;
      color: #000000;
      font-size: clamp(3rem, 8vw, 3.4rem);
      letter-spacing: 0.08em;
      line-height: 1.3;
      margin: 0;
      text-align: center;
    }

    .corner {
      position: fixed;
      width: clamp(28px, 6vw, 56px);
      height: clamp(28px, 6vw, 56px);
      border-color: #000000;
      border-style: solid;
      border-width: 0;
    }
    .corner.tl { top: 0; left: 0; border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: 0; right: 0; border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: 0; left: 0; border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: 0; right: 0; border-bottom-width: 2.5px; border-right-width: 2.5px; }
  </style>
</head>
<body>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <div class="stage">
    <h1>FRAME</h1>
  </div>
</body>
</html>
