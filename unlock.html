<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #ffffff; min-height: 100%; }
    body {
      color: #000000;
      -webkit-font-smoothing: antialiased;
      font-family: 'Space Grotesk', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(64px, 12vh, 96px) 0 clamp(48px, 8vh, 72px);
    }
    .home-link { color: inherit; text-decoration: none; }
    .brand {
      position: fixed; top: 8px; left: 8px; margin: 0; z-index: 6;
      font-family: 'Chakra Petch', sans-serif; font-weight: 700; color: #000000;
      font-size: clamp(18px, 5vw, 40px); letter-spacing: 0.08em; line-height: 1;
    }

    .panel { width: min(90vw, 400px); }
    .title {
      font-family: 'Chakra Petch', sans-serif; font-weight: 700;
      letter-spacing: 0.03em; font-size: clamp(1.5rem, 6vw, 2.1rem);
      margin: 0; text-align: center;
    }
    .subtitle {
      color: #666666; font-weight: 500; text-align: center;
      margin: 8px 0 0; font-size: clamp(0.95rem, 3.2vw, 1.05rem);
    }
    .idline {
      text-align: center; margin-top: 6px;
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: clamp(0.85rem, 3.2vw, 1rem); color: #000000;
      word-break: break-all;
    }
    .detected {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      margin-top: 8px; color: #17a34a; font-weight: 600;
      font-size: 0.8rem; letter-spacing: 0.02em;
    }
    .detected .dot { width: 7px; height: 7px; border-radius: 50%; background: #17a34a; }
    .reclink {
      display: block; text-align: center; margin-top: 14px;
      color: #000000; font-weight: 600; font-size: 0.85rem;
      text-decoration: underline; cursor: pointer;
    }
    .divider { width: 100%; height: 0; border-top: 1.5px solid #000000; margin: clamp(16px, 3vh, 22px) 0; }

    .pin {
      display: block; width: 100%; text-align: center;
      border: 1.5px solid #000000; padding: 16px;
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: clamp(1.6rem, 8vw, 2.4rem); letter-spacing: 0.5em;
      text-indent: 0.5em; background: #ffffff; color: #000000;
    }
    .pin:focus { outline: 2px solid #000000; outline-offset: 2px; }
    .pin:disabled { background: #f2f2f2; color: #999999; }
    .hint { text-align: center; color: #888888; font-size: 0.85rem; margin-top: 10px; min-height: 1.1em; }
    .hint.err { color: #c1121f; font-weight: 600; }

    .btn {
      display: block; width: 100%; box-sizing: border-box;
      padding: clamp(13px, 2.6vh, 17px) 18px; margin-top: clamp(18px, 3vh, 24px);
      background: #000000; color: #ffffff; border: 1.5px solid #000000;
      text-align: center; text-decoration: none;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600;
      letter-spacing: 0.02em; font-size: clamp(1rem, 3.6vw, 1.15rem); cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .btn:hover { background: #ffffff; color: #000000; }
    .btn:disabled { background: #f2f2f2; color: #999999; border-color: #cccccc; cursor: not-allowed; }

    .altsep {
      display: flex; align-items: center; gap: 12px;
      color: #999999; font-size: 0.8rem; letter-spacing: 0.08em; text-transform: uppercase;
      margin: clamp(22px, 4vh, 30px) 0 clamp(14px, 2.4vh, 18px);
    }
    .altsep::before, .altsep::after { content: ""; flex: 1; height: 0; border-top: 1px solid #dddddd; }
    .alt { display: flex; flex-direction: column; gap: clamp(10px, 1.8vh, 14px); }
    .alt a {
      display: block; text-align: center; text-decoration: none;
      padding: clamp(11px, 2.2vh, 15px) 18px;
      border: 1.5px solid #000000; background: #ffffff; color: #000000;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600;
      font-size: clamp(0.95rem, 3.4vw, 1.05rem);
      transition: background 0.15s ease, color 0.15s ease;
    }
    .alt a:hover { background: #000000; color: #ffffff; }

    .corner {
      position: fixed; width: clamp(28px, 6vw, 56px); height: clamp(28px, 6vw, 56px);
      border-color: #000000; border-style: solid; border-width: 0; pointer-events: none;
    }
    .corner.tl { top: 0; left: 0; border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: 0; right: 0; border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: 0; left: 0; border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: 0; right: 0; border-bottom-width: 2.5px; border-right-width: 2.5px; }
  </style>
</head>
<body>
  <script src="/frame.js"></script>
  <script>
    (function () {
      try {
        var idents = FRAME.getIdentities();
        if (idents.length === 0) { window.location.replace("/dapps.html"); return; }
        var active = FRAME.getActive();
        if (!active) { window.location.replace("/wallet.html"); return; }
        if (!active.passcode) { FRAME.markUnlocked(active.frameId); window.location.replace("/dapps.html"); return; }
        if (FRAME.isUnlocked(active.frameId)) { window.location.replace("/dapps.html"); return; }
      } catch (e) {}
    })();
  </script>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <h1 class="brand"><a class="home-link" href="/">FRAME</a></h1>

  <main class="panel">
    <h2 class="title">Enter passcode</h2>
    <p class="subtitle">Unlock your FRAME identity.</p>
    <div class="idline" id="idLine"></div>
    <div class="detected"><span class="dot"></span><span id="detectedVia">Detected via this browser's storage</span></div>
    <div class="divider"></div>
    <form id="pwForm" novalidate>
      <input class="pin" id="pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="5" autocomplete="off" aria-label="5-digit passcode" />
      <div class="hint" id="pinHint">Enter your 5-digit passcode.</div>
      <button class="btn" id="unlockBtn" type="submit">Unlock</button>
      <a class="reclink" href="/recover.html">Forgot passcode? Restore with recovery key</a>
    </form>

    <div class="altsep">or</div>
    <div class="alt">
      <a href="/wallet.html">Manage identities</a>
      <a href="/create.html">Create identity</a>
      <a href="/connect.html">Connect to existing identity</a>
    </div>
  </main>

  <script>
    (function () {
      var active = FRAME.getActive();
      if (!active) { window.location.replace("/wallet.html"); return; }

      if (active.frameId) document.getElementById("idLine").textContent = active.frameId;

      var settings = active.settings || { maxAttempts: 5, onLimit: "lock" };
      var maxAttempts = settings.maxAttempts; // null = unlimited
      var onLimit = settings.onLimit || "lock";

      var pin = document.getElementById("pin");
      var pinHint = document.getElementById("pinHint");
      var unlockBtn = document.getElementById("unlockBtn");

      function lockDevice() {
        active.locked = true;
        FRAME.updateIdentity(active);
        pin.disabled = true;
        unlockBtn.disabled = true;
        pinHint.classList.add("err");
        pinHint.textContent = "Locked. Too many incorrect attempts. Restore with your recovery key.";
      }

      if (onLimit === "lock" && active.locked) {
        lockDevice();
      } else {
        setTimeout(function () { pin.focus(); }, 50);
      }

      pin.addEventListener("input", function () {
        pin.value = pin.value.replace(/\D/g, "").slice(0, 5);
        pinHint.classList.remove("err");
        pinHint.textContent = "Enter your 5-digit passcode.";
      });

      document.getElementById("pwForm").addEventListener("submit", function (e) {
        e.preventDefault();
        if (pin.disabled) return;
        if (pin.value.length !== 5) {
          pinHint.classList.add("err");
          pinHint.textContent = "Passcode must be exactly 5 digits.";
          pin.focus();
          return;
        }
        unlockBtn.disabled = true;
        FRAME.verifyPasscode(active, pin.value).then(function (ok) {
          unlockBtn.disabled = false;
          if (ok) {
            active.failedAttempts = 0;
            active.locked = false;
            FRAME.updateIdentity(active);
            FRAME.markUnlocked(active.frameId);
            window.location.href = "/dapps.html";
            return;
          }

          var fails = (active.failedAttempts || 0) + 1;
          active.failedAttempts = fails;
          FRAME.updateIdentity(active);
          pin.value = "";

          if (maxAttempts !== null && maxAttempts !== undefined && fails >= maxAttempts) {
            if (onLimit === "wipe") {
              FRAME.removeIdentity(active.frameId);
              alert("Too many incorrect attempts. This identity has been erased from this device.");
              window.location.href = "/dapps.html";
              return;
            }
            lockDevice();
            return;
          }

          pinHint.classList.add("err");
          if (maxAttempts === null || maxAttempts === undefined) {
            pinHint.textContent = "Incorrect passcode. Try again.";
          } else {
            var remaining = maxAttempts - fails;
            pinHint.textContent = "Incorrect passcode. " + remaining + " attempt" + (remaining === 1 ? "" : "s") + " remaining.";
          }
          pin.focus();
        }).catch(function () {
          unlockBtn.disabled = false;
          pinHint.classList.add("err");
          pinHint.textContent = "Could not verify passcode.";
        });
      });
    })();
  </script>
</body>
</html>
