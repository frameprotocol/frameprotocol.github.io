<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #ffffff;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000000;
      -webkit-font-smoothing: antialiased;
      overflow: auto;
    }
    .home-link { color: inherit; text-decoration: none; }
    .brand {
      position: fixed;
      top: 8px;
      left: 8px;
      margin: 0;
      z-index: 5;
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 700;
      color: #000000;
      font-size: clamp(18px, 5vw, 40px);
      letter-spacing: 0.08em;
      line-height: 1;
    }

    .panel {
      width: min(88vw, 380px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 24px 0;
    }
    .status {
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: clamp(1.5rem, 6vw, 2rem);
      margin: 0;
    }
    .prompt {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      color: #666666;
      font-size: clamp(0.95rem, 3.4vw, 1.1rem);
      margin: 8px 0 clamp(22px, 4vh, 32px);
    }
    .actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: clamp(12px, 2vh, 16px);
    }
    .btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      padding: clamp(12px, 2.4vh, 16px) 18px;
      background: #ffffff;
      color: #000000;
      border: 1.5px solid #000000;
      text-align: center;
      text-decoration: none;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      letter-spacing: 0.02em;
      font-size: clamp(0.95rem, 3.4vw, 1.1rem);
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .btn:hover { background: #000000; color: #ffffff; }

    .corner {
      position: fixed;
      width: clamp(28px, 6vw, 56px);
      height: clamp(28px, 6vw, 56px);
      border-color: #000000;
      border-style: solid;
      border-width: 0;
    }
    .corner.tl { top: 0; left: 0; border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: 0; right: 0; border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: 0; left: 0; border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: 0; right: 0; border-bottom-width: 2.5px; border-right-width: 2.5px; }
  </style>
</head>
<body>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <h1 class="brand"><a class="home-link" href="/">FRAME</a></h1>
  <main class="panel">
    <p class="status">No FRAME found.</p>
    <p class="prompt">Create one?</p>
    <div class="actions">
      <a class="btn" href="/create.html">Create Local FRAME</a>
      <label class="btn" for="importFile">Import FRAME</label>
      <input id="importFile" type="file" accept=".frame,.json,application/json,*/*" hidden />
      <a class="btn" href="/connect.html">Connect to Existing FRAME</a>
    </div>
  </main>
</body>
</html>
