<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }
    .stage {
      margin-top: clamp(56px, 9vh, 76px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(2px, 0.4vh, 6px);
      padding: 0 24px;
    }
    .home-link {
      color: inherit;
      text-decoration: none;
    }
    .nav {
      position: fixed;
      top: calc(50% - 1in);
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
    }
    .nav a {
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 700;
      color: #000000;
      letter-spacing: 0.05em;
      text-decoration: none;
    }
    .nav .side {
      align-self: flex-end;
      margin-right: clamp(24px, 6vw, 72px);
      font-size: clamp(1.4rem, 4vw, 2rem);
      text-align: right;
    }
    .nav .nav-how { margin-top: clamp(24px, 5vh, 44px); }
    .nav .side:hover { text-decoration: underline; }

    .begin-wrap {
      position: fixed;
      left: 50%;
      bottom: max(12px, calc(env(safe-area-inset-bottom, 0px) + 12px));
      transform: translateX(-50%);
    }
    .nav-begin {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-decoration: none;
      font-size: clamp(2.8rem, 8vw, 4.2rem);
      background: linear-gradient(90deg,#ff004c,#ff8a00,#ffe600,#25d366,#00e0ff,#3b5bff,#a34bff,#ff004c);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      animation: rainbow-move 6s linear infinite;
    }
    @keyframes rainbow-move { to { background-position: 200% center; } }
    .brand {
      position: fixed;
      top: max(8px, env(safe-area-inset-top, 0px)); left: max(8px, env(safe-area-inset-left, 0px));
      margin: 0;
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 700;
      color: #000000;
      font-size: clamp(18px, 5vw, 40px);
      letter-spacing: 0.08em;
      line-height: 1;
    }
    .typewriter {
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 400;
      color: #000000;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      letter-spacing: 0.03em;
      line-height: 1.4;
      text-align: center;
      min-height: 1.4em;
    }
    .typewriter .cursor {
      display: inline-block;
      width: 1px;
      background: #000000;
      margin-left: 2px;
      animation: blink 1s steps(1) infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    .corner {
      position: fixed;
      width: clamp(28px, 6vw, 56px);
      height: clamp(28px, 6vw, 56px);
      border-color: #000000;
      border-style: solid;
      border-width: 0;
    }
    .corner.tl { top: env(safe-area-inset-top, 0px); left: env(safe-area-inset-left, 0px); border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: env(safe-area-inset-top, 0px); right: env(safe-area-inset-right, 0px); border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: env(safe-area-inset-bottom, 0px); left: env(safe-area-inset-left, 0px); border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: env(safe-area-inset-bottom, 0px); right: env(safe-area-inset-right, 0px); border-bottom-width: 2.5px; border-right-width: 2.5px; }
  
    /* mobile: safe-area, overflow, touch */
    html { overflow-x: hidden; }
    @media (max-width: 480px) {
      .row { grid-template-columns: minmax(72px, 34%) 1fr !important; }
    }

  
    @media (max-height: 560px), (max-width: 400px) {
      .nav { top: auto; bottom: max(88px, calc(env(safe-area-inset-bottom, 0px) + 72px)); }
      .nav .side { font-size: clamp(1.15rem, 5vw, 1.5rem); margin-right: max(16px, env(safe-area-inset-right, 0px)); }
      .nav .nav-how { margin-top: 14px; }
      .nav-begin { font-size: clamp(2.2rem, 10vw, 3rem); }
      .stage { margin-top: max(48px, calc(env(safe-area-inset-top, 0px) + 40px)); padding: 0 max(16px, env(safe-area-inset-right, 0px)) 0 max(16px, env(safe-area-inset-left, 0px)); }
    }
    /* index mobile */
  </style>
</head>
<body>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <h1 class="brand"><a class="home-link" href="/">FRAME</a></h1>
  <div class="stage">
    <div class="typewriter"><span id="tw-text"></span><span class="cursor">&nbsp;</span></div>
  </div>
  <nav class="nav">
    <a class="side nav-why" href="/why.html">Why?</a>
    <a class="side nav-how" href="/how.html">How it works</a>
  </nav>
  <div class="begin-wrap">
    <a class="nav-begin" href="/dapps.html">Start</a>
  </div>
  <script>
    (function () {
      const phrases = [
        "No more passwords.",
        "Own your digital life.",
        "Take back control.",
        "Your data stays yours.",
        "Privacy by default.",
        "Permission instead of passwords.",
        "Everything connected.",
        "Every app speaks the same language.",
        "What the internet should've been from the beginning.",
        "The internet, reinvented.",
        "Secure by design.",
        "Verifiable code.",
        "Verifiable truth.",
        "Fully open source.",
        "Local-first.",
        "Runs on bare metal.",
        "Native Rust.",
        "Built for the future."
      ];
      const el = document.getElementById("tw-text");
      const typeSpeed = 65;
      const deleteSpeed = 25;
      const holdAfterType = 1400;
      const holdAfterDelete = 250;
      let phraseIndex = 0;
      let charIndex = 0;
      let deleting = false;

      function tick() {
        const current = phrases[phraseIndex];
        if (!deleting) {
          charIndex++;
          el.textContent = current.slice(0, charIndex);
          if (charIndex === current.length) {
            deleting = true;
            return setTimeout(tick, holdAfterType);
          }
          return setTimeout(tick, typeSpeed);
        } else {
          charIndex--;
          el.textContent = current.slice(0, charIndex);
          if (charIndex === 0) {
            deleting = false;
            phraseIndex = (phraseIndex + 1) % phrases.length;
            return setTimeout(tick, holdAfterDelete);
          }
          return setTimeout(tick, deleteSpeed);
        }
      }
      tick();
    })();
  </script>
</body>
</html>
