<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }
    .stage {
      margin-top: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(2px, 0.4vh, 6px);
      padding: 0 24px;
    }
    .nav-why {
      position: fixed;
      top: calc(50% - 2in);
      right: clamp(24px, 6vw, 72px);
      transform: translateY(-50%);
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 700;
      color: #000000;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 0.05em;
      text-align: right;
      text-decoration: none;
    }
    .nav-why:hover { text-decoration: underline; }
    h1 {
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 700;
      color: #000000;
      font-size: clamp(3rem, 8vw, 3.4rem);
      letter-spacing: 0.08em;
      line-height: 1.3;
      margin: 0;
      text-align: center;
    }
    .typewriter {
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 400;
      color: #000000;
      font-size: clamp(1rem, 3.2vw, 1.4rem);
      letter-spacing: 0.03em;
      line-height: 1.4;
      text-align: center;
      min-height: 1.4em;
    }
    .typewriter .cursor {
      display: inline-block;
      width: 1px;
      background: #000000;
      margin-left: 2px;
      animation: blink 1s steps(1) infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    .corner {
      position: fixed;
      width: clamp(28px, 6vw, 56px);
      height: clamp(28px, 6vw, 56px);
      border-color: #000000;
      border-style: solid;
      border-width: 0;
    }
    .corner.tl { top: 0; left: 0; border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: 0; right: 0; border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: 0; left: 0; border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: 0; right: 0; border-bottom-width: 2.5px; border-right-width: 2.5px; }
  </style>
</head>
<body>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <div class="stage">
    <h1>FRAME</h1>
    <div class="typewriter"><span id="tw-text"></span><span class="cursor">&nbsp;</span></div>
  </div>
  <a class="nav-why" href="/why.html">Why?</a>
  <script>
    (function () {
      const phrases = [
        "No more passwords.",
        "No more getting hacked.",
        "Own your digital life.",
        "Take back control.",
        "Your data stays yours.",
        "Privacy by default.",
        "Permission instead of passwords.",
        "Everything connected.",
        "Every app speaks the same language.",
        "What the internet should've been from the beginning.",
        "The internet, reinvented.",
        "Secure by design.",
        "Verifiable code.",
        "Verifiable truth.",
        "Fully open source.",
        "Local-first.",
        "Runs on bare metal.",
        "Native Rust.",
        "Built for the future."
      ];
      const el = document.getElementById("tw-text");
      const typeSpeed = 65;
      const deleteSpeed = 25;
      const holdAfterType = 1400;
      const holdAfterDelete = 250;
      let phraseIndex = 0;
      let charIndex = 0;
      let deleting = false;

      function tick() {
        const current = phrases[phraseIndex];
        if (!deleting) {
          charIndex++;
          el.textContent = current.slice(0, charIndex);
          if (charIndex === current.length) {
            deleting = true;
            return setTimeout(tick, holdAfterType);
          }
          return setTimeout(tick, typeSpeed);
        } else {
          charIndex--;
          el.textContent = current.slice(0, charIndex);
          if (charIndex === 0) {
            deleting = false;
            phraseIndex = (phraseIndex + 1) % phrases.length;
            return setTimeout(tick, holdAfterDelete);
          }
          return setTimeout(tick, deleteSpeed);
        }
      }
      tick();
    })();
  </script>
</body>
</html>
