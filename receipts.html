<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frame</title>
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; background: #ffffff; min-height: 100%; }
    body {
      color: #000000; -webkit-font-smoothing: antialiased;
      font-family: 'Space Grotesk', sans-serif;
      display: flex; align-items: flex-start; justify-content: center;
      padding: clamp(64px, 12vh, 96px) 0 clamp(48px, 8vh, 72px);
    }
    .home-link { color: inherit; text-decoration: none; }
    .brand {
      position: fixed; top: 8px; left: 8px; margin: 0; z-index: 6;
      font-family: 'Chakra Petch', sans-serif; font-weight: 700; color: #000000;
      font-size: clamp(18px, 5vw, 40px); letter-spacing: 0.08em; line-height: 1;
    }
    .panel { width: min(92vw, 620px); }
    .title { font-family: 'Chakra Petch', sans-serif; font-weight: 700; letter-spacing: 0.03em; font-size: clamp(1.5rem, 6vw, 2.1rem); margin: 0; text-align: center; }
    .subtitle { color: #666666; font-weight: 500; text-align: center; margin: 8px 0 0; font-size: clamp(0.9rem, 3.2vw, 1rem); }
    .divider { width: 100%; height: 0; border-top: 1.5px solid #000000; margin: clamp(16px, 3vh, 22px) 0; }

    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
    .summary { font-family: 'Space Mono', monospace; font-size: 0.82rem; color: #444444; }
    .btn {
      font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 0.85rem;
      border: 1.5px solid #000000; background: #ffffff; color: #000000; border-radius: 999px;
      padding: 8px 16px; cursor: pointer; transition: background 0.12s ease, color 0.12s ease;
    }
    .btn:hover { background: #000000; color: #ffffff; }

    .rcpt { border: 1px solid #e6e6e6; border-radius: 14px; padding: clamp(14px, 2.2vw, 20px); margin-bottom: 14px; }
    .rcpt-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .rcpt-ic { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 8px; background: #f2f2f2; color: #0f7a3d; flex: 0 0 auto; }
    .rcpt-ic svg { width: 18px; height: 18px; }
    .rcpt-name { font-family: 'Chakra Petch', sans-serif; font-weight: 700; font-size: 1.05rem; }
    .pill { margin-left: auto; display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-weight: 700; font-size: 0.72rem; font-family: 'Space Mono', monospace; }
    .pill svg { width: 12px; height: 12px; }
    .pill.ok { background: #e9f7ef; color: #0f7a3d; }
    .pill.bad { background: #fdecec; color: #c0392b; }
    .pill.pending { background: #fff7e0; color: #a97400; }
    .row { font-family: 'Space Mono', monospace; font-size: 0.76rem; color: #333333; display: grid; grid-template-columns: 92px 1fr; gap: 4px 12px; margin-top: 4px; }
    .row .k { color: #999999; }
    .row .v { word-break: break-all; }
    .empty { border: 1px dashed #cccccc; border-radius: 14px; padding: 28px; text-align: center; color: #888888; font-size: 0.92rem; }

    .corner { position: fixed; width: clamp(28px, 6vw, 56px); height: clamp(28px, 6vw, 56px); border-color: #000000; border-style: solid; border-width: 0; pointer-events: none; }
    .corner.tl { top: 0; left: 0; border-top-width: 2.5px; border-left-width: 2.5px; }
    .corner.tr { top: 0; right: 0; border-top-width: 2.5px; border-right-width: 2.5px; }
    .corner.bl { bottom: 0; left: 0; border-bottom-width: 2.5px; border-left-width: 2.5px; }
    .corner.br { bottom: 0; right: 0; border-bottom-width: 2.5px; border-right-width: 2.5px; }
  </style>
</head>
<body>
  <script src="/frame.js"></script>
  <script>
    (function () {
      try {
        var idents = FRAME.getIdentities();
        if (idents.length === 0) { window.location.replace("/dashboard.html"); return; }
        var active = FRAME.getActive();
        if (!active) { window.location.replace("/identity.html"); return; }
        if (!FRAME.isUnlocked(active.frameId)) { window.location.replace("/unlock.html"); }
      } catch (e) {}
    })();
  </script>
  <span class="corner tl"></span>
  <span class="corner tr"></span>
  <span class="corner bl"></span>
  <span class="corner br"></span>
  <h1 class="brand"><a class="home-link" href="/">FRAME</a></h1>

  <main class="panel">
    <h2 class="title">Receipts</h2>
    <p class="subtitle">Every signed dApp state, verified against its identity key.</p>
    <div class="divider"></div>

    <div class="toolbar">
      <span class="summary" id="summary">Checking&hellip;</span>
      <button class="btn" id="reverify" type="button">Re-verify all</button>
    </div>
    <div id="list"></div>
  </main>

  <script>
    (function () {
      var CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>';
      var listEl = document.getElementById("list");
      var summaryEl = document.getElementById("summary");

      function shorten(s, n) { s = String(s || ""); return s.length > n ? s.slice(0, n) + "\u2026" : s; }

      // Collect signed dApp records from localStorage (frame.dapp.*).
      function collect() {
        var out = [];
        FRAME.localStorageEntries().forEach(function (e) {
          if (e.name.indexOf("frame.dapp.") !== 0) return;
          var d = null; try { d = JSON.parse(localStorage.getItem(e.name)); } catch (x) {}
          if (!d) return;
          out.push({ key: e.name, d: d });
        });
        return out;
      }

      function render() {
        var records = collect();
        listEl.innerHTML = "";
        if (records.length === 0) {
          listEl.innerHTML = '<div class="empty">No dApp receipts yet. Open the Calculator dApp to sign and store some state.</div>';
          summaryEl.textContent = "0 receipts";
          return;
        }

        var verifiedCount = 0, total = 0;
        var pending = records.length;

        records.forEach(function (rec) {
          var d = rec.d;
          var card = document.createElement("div");
          card.className = "rcpt";

          var hasSig = !!(d.signature && d.signedBy);
          var signer = hasSig ? FRAME.getById(d.signedBy) : null;
          var pubKey = signer ? signer.publicKey : null;
          var payload = d.state ? JSON.stringify(d.state) : "";
          var alg = d.sigAlg || (pubKey ? FRAME.keyAlgLabel(pubKey) : "unknown");

          card.innerHTML =
            '<div class="rcpt-head">' +
              '<span class="rcpt-ic">' + CHECK + '</span>' +
              '<span class="rcpt-name">' + (d.name || rec.key) + '</span>' +
              '<span class="pill pending">verifying\u2026</span>' +
            '</div>' +
            '<div class="row"><span class="k">dApp</span><span class="v">' + rec.key + '</span></div>' +
            '<div class="row"><span class="k">scheme</span><span class="v">' + (d.sigScheme || "\u2014") + ' \u00b7 ' + alg + '</span></div>' +
            '<div class="row"><span class="k">signed by</span><span class="v">' + (d.signedBy || "unsigned") + '</span></div>' +
            '<div class="row"><span class="k">updated</span><span class="v">' + (d.updatedAt || "\u2014") + '</span></div>' +
            '<div class="row"><span class="k">payload</span><span class="v">' + (payload ? shorten(payload, 120) : "\u2014") + '</span></div>' +
            '<div class="row"><span class="k">signature</span><span class="v">' + (d.signature ? shorten(d.signature, 60) : "\u2014") + '</span></div>';
          listEl.appendChild(card);

          var pill = card.querySelector(".pill");
          total++;

          function done() { pending--; if (pending === 0) summaryEl.textContent = verifiedCount + " of " + total + " verified"; }

          if (!hasSig) { pill.className = "pill pending"; pill.textContent = "unsigned"; done(); return; }
          if (!pubKey) { pill.className = "pill bad"; pill.textContent = "signer not found"; done(); return; }

          FRAME.verifyData(pubKey, payload, d.signature).then(function (ok) {
            if (ok) { pill.className = "pill ok"; pill.innerHTML = CHECK + "verified"; verifiedCount++; }
            else { pill.className = "pill bad"; pill.textContent = "invalid"; }
            done();
          }).catch(function () { pill.className = "pill bad"; pill.textContent = "error"; done(); });
        });
      }

      document.getElementById("reverify").addEventListener("click", render);
      render();
    })();
  </script>
</body>
</html>
